# configs/bootstrap_30min.yaml — 30-minute Phase 4 bootstrap smoke/test run
# Depth-1 removed: plays near-random moves that hit unusual positions more
# frequently and are the primary trigger for the Ramora line-1094 C++ crash.
# Depth 2-4 produces more natural play and is significantly more stable.

bootstrap:
  wall_clock_hours: 0.45          # ~27 minutes hard deadline
  workers: 8
  depth_schedule:
    2: 0.40                       # 40% depth-2 (~0.02 s/move)
    3: 0.40                       # 40% depth-3 (~0.05 s/move)
    4: 0.20                       # 20% depth-4 (~0.10 s/move)
  buffer_capacity: 50_000
  train_start_fill_fraction: 0.20 # start training at 10k positions
  augment: true
  tag_game_ids: true
  min_ply_before_push: 2
  checkpoint_every_steps: 500
  log_dir: logs/bootstrap_30min
  checkpoint_dir: checkpoints/bootstrap_30min

model:
  board_size: 19
  in_channels: 18
  res_blocks: 10
  filters: 128

training:
  batch_size: 256
  lr: 2.0e-3
  weight_decay: 1.0e-4
  lr_schedule: cosine
  total_steps: 5000   # LR cosine horizon; run will likely hit wall_clock first

seed: 42
