# training.yaml — training loop hyperparameters
# Single source of truth for all training settings.

fp16: true
torch_compile: false   # reduce-overhead CUDA graphs are thread-local; inference+train share one model → crash
policy_prune_frac: 0.02
batch_size: 256
min_buffer_size: 256
training_steps_per_game: 2.0
max_train_burst: 8
lr: 0.002
weight_decay: 0.0001
grad_clip: 1.0
lr_schedule: cosine
eval_interval: 500
checkpoint_interval: 500
max_checkpoints_kept: 10
log_interval: 10        # also controls web-dashboard send frequency
aux_opp_reply_weight: 0.15

game_length_weights:
  thresholds: [10, 25]
  weights: [0.15, 0.50]
  default_weight: 1.0

buffer_schedule:
  - {step: 0,         capacity: 250_000}
  - {step: 500_000,   capacity: 500_000}
  - {step: 1_500_000, capacity: 1_000_000}

mixing:
  pretrained_buffer_path: "data/bootstrap_corpus.npz"
  decay_steps: 1_000_000
  min_pretrained_weight: 0.1
  initial_pretrained_weight: 0.8

seed: 42
