# training.yaml — training loop hyperparameters
# Single source of truth for all training settings.

fp16: true
torch_compile: false   # disabled — Python 3.14 CUDA graph incompatibility (see sprint §25, §30)
policy_prune_frac: 0.02
completed_q_values: true   # use KL loss instead of CE for policy (must match selfplay)
batch_size: 256
min_buffer_size: 256
training_steps_per_game: 2.0
max_train_burst: 8
lr: 0.002
weight_decay: 0.0001
grad_clip: 1.0
lr_schedule: cosine
eval_interval: 5000
checkpoint_interval: 500
max_checkpoints_kept: 10
log_interval: 10        # also controls web-dashboard send frequency
aux_opp_reply_weight: 0.15
entropy_reg_weight: 0.01  # policy entropy regularization (KrakenBot-style, prevents policy collapse)
draw_reward: -0.5         # draw outcome value target (was -0.1; raised after 56% draw collapse in first overnight run)
recency_weight: 0.75      # fraction of each batch from the recent-position ring buffer (newest ~50% of buffer)
uncertainty_weight: 0.0   # disabled — Gaussian NLL diverges when σ²→0 causing total_loss spikes to ~394
ownership_weight: 0.1     # weight for ownership auxiliary head (spatial MSE); training only
threat_weight: 0.1        # weight for binary threat auxiliary head (winning-line BCE); training only

game_length_weights:
  # Thresholds are in compound moves (player turns), not plies.
  # Each turn = 2 stones placed (except player 1's opening move).
  # < 10 turns ~ < 20 plies  (very short games)
  # 10-24 turns ~ 20-48 plies (mid-length games)
  # >= 25 turns ~ >= 50 plies (full games, weight 1.0)
  thresholds: [10, 25]
  weights: [0.15, 0.50]
  default_weight: 1.0

buffer_schedule:
  - {step: 0,         capacity: 100_000}
  - {step: 150_000,   capacity: 250_000}
  - {step: 500_000,   capacity: 500_000}

mixing:
  pretrained_buffer_path: "data/bootstrap_corpus.npz"
  decay_steps: 300_000
  min_pretrained_weight: 0.1
  initial_pretrained_weight: 0.8
  pretrain_max_samples: 200_000  # cap corpus loaded into Rust buffer; limits page cache to ~2.5 GB
  buffer_persist: true
  buffer_persist_path: "checkpoints/replay_buffer.bin"

seed: 42
