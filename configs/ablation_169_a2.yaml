# §169 A2 — K-cluster + PMA pool ablation arm.
#
# Same recipe as the v6w25 anchor (§168 Gate 5) — only architectural delta
# is pool_type: 'pma' replacing 'min_max'. Recipe captured here for the
# §169 retrain orchestrator and the post-hoc audit; pretrain.py consumes
# the same fields via CLI flags from scripts/pretrain_a2_pma.sh.

arm: A2
description: K-cluster encoder with Set Transformer PMA pool replacing fixed min/max
sprint: "§169"

encoding: v6w25
board_size: 25
in_channels: 8
n_actions: 626
filters: 128
res_blocks: 12
se_reduction_ratio: 4

pool_type: pma
pool_attn_dropout: 0.1   # Lee 2019 PMA-collapse mitigation; bump to 0.2 if smoke fires
pool_n_heads: 4

corpus_npz: data/bootstrap_corpus_v6w25.npz

# Match v6w25 anchor (§168 Gate 5) — 30 ep cosine, peak 2e-3, eta_min 5e-5, batch 256.
batch_size: 256
epochs: 30
lr_peak: 2.0e-3
eta_min: 5.0e-5
label_smoothing: 0.05
aux_opp_reply_weight: 0.15

artefacts:
  checkpoint: checkpoints/ablation_169/A2_pma.pt
  pretrain_log: reports/ablation_169/A2_pretrain.log
  eval: reports/ablation_169/A2_eval.json
  threat_probe: reports/ablation_169/A2_threat.json
  bench: reports/ablation_169/bench_per_arm.md

# Hard surface conditions — see scripts/pretrain_a2_pma.sh for the gate logic.
hard_stop:
  final_loss_gt: 5.36          # 50% above v6w25 anchor 3.57
  nan_skip_pct_gt: 30
  pma_collapse_required: true  # tested via synthetic 2-cluster fixture

eval_matrix:
  argmax:
    legal_radius: 8
    n_games: 200
  mcts_n:
    n_games: 200
    n_sims: operator_chosen     # default 128 per §169 P1 estimate
