# selfplay.yaml — self-play and MCTS configuration

mcts:
  n_simulations: 400
  c_puct: 1.5
  # KataGo-style dynamic FPU (First Play Urgency).
  # Unvisited children receive Q = parent_q - fpu_reduction * sqrt(explored_policy_mass)
  # where explored_policy_mass = sum of priors for all already-visited children.
  # As more children are explored the reduction grows, naturally directing search toward
  # refining known-good moves rather than sampling every legal move uniformly.
  # KrakenBot uses 0.25; set to 0.0 to restore the legacy Q=0 behaviour.
  fpu_reduction: 0.25
  # Quiescence value override at leaf nodes.
  # Game theorem: each turn places 2 stones, so the opponent can block at most 2
  # winning cells per response.  If the current player has ≥3 winning moves the
  # leaf value is overridden to +1.0 (forced win).  If the opponent has ≥3, to -1.0.
  # The policy is NOT affected — the network still learns about these positions.
  quiescence_enabled: true
  # Value blend amount for the 2-winning-moves case (strong but unproven).
  # NN value is nudged by ±quiescence_blend_2 toward ±1.0, clamped to [-1, 1].
  quiescence_blend_2: 0.3
  dirichlet_alpha: 0.05    # §115: Go-regime α for hex branching factor ~250-300 (§116 #4).
                           # Was 0.3 (chess-regime). Noise effective-temperature too low past opening.
  epsilon: 0.10            # §143 γ.2: was 0.25; bootstrap-v6 head intact, 25% noise overrides its signal
  dirichlet_enabled: true   # gates Dirichlet call in Rust training path; set false for noise-free eval
  # LEGACY EVAL/BOT alias only — NOT the training path. Training self-play
  # temperature lives in selfplay.playout_cap.{temperature_threshold_compound_moves,
  # temp_min} (Rust quarter-cosine). get_temperature() honours this ply-clock key
  # for eval/bot games, auto-converting plies -> compound-turns ((ply+1)//2). (D-TEMPDECAY C2.)
  temperature_threshold_ply: 30
  # D-QFIX-LAND A1: interior (non-root) MCTS node selection rule. HARD-READ by
  # pool.py (`mcts["interior_selector"]` — KeyError if removed); Rust panics on
  # an unknown variant. "puct" = today's behaviour (PUCT interior, Gumbel forces
  # only the root via Sequential Halving — byte-identical to pre-A1). Set to
  # "gumbel_improved" to select the WIRED PLACEHOLDER arm (delegates to PUCT +
  # warns once; the real interior-Gumbel rule is future work).
  interior_selector: puct

selfplay:
  # Gumbel completed Q-values (Danihelka et al., ICLR 2022).
  # Compute improved policy targets using MCTS Q-values instead of raw visit counts.
  # Primary benefit: useful policy signal even at 50-sim fast games.
  # Override via --variant gumbel_full or --variant gumbel_targets.
  completed_q_values: false
  c_visit: 50.0
  c_scale: 1.0

  # O1 (SootyOwl-validated) forced-win → one-hot POLICY target.
  # When MCTS proves a within-turn forced win that the soft visit distribution
  # under-weights, harden the *training* policy target to a (near-)one-hot on the
  # proven winning move (the value head already gets a forced-win override via
  # quiescence; the policy head did not). Targets HeXO's policy-side flatness /
  # weak finishing (§P6 verdict: greedy/sampled ~1.8x gap, soft ~3.1-nat policy).
  # Default OFF — single-variable discipline; the validation smoke flips
  # `forced_win_policy_enabled: true`. depth 1 = immediate win only;
  # 2 = +within-turn (depth-2) setup. weight 1.0 = pure one-hot; <1.0 = blend.
  #
  # P4 (PRELONG, 2026-06-04) — O1 = SHELVED + ARMED, NOT a pre-committed lever.
  # The O1 validation smoke (v6_live2_o1_smoke_result_2026-06-04.md) showed
  # GATE-1 NOT MET: the 1.8× sharpening premise was a measurement artifact
  # (greedy@plies-4 vs sampled@plies-0); O1 delivered no significant 30k WR
  # gain. O1's ONLY surviving signal is mid-run V_spread stabilization (held
  # +0.28..+0.36 while baseline dipped negative, then both self-corrected by
  # 30k). So O1 stays banked default-OFF; it is the PRE-REGISTERED REACTIVE
  # response IFF the V_spread excursion fails to self-correct at 200-300k scale
  # (where the baseline may not recover). Do NOT enable on the WR-sharpening
  # rationale (dead) — only flip this if the long-run V_spread canary captures.
  forced_win_policy_enabled: false
  forced_win_policy_depth: 2
  forced_win_policy_weight: 1.0

  # D-WS3 L1 — native solver-in-loop SOFT visit-injection (the L1 "teach the
  # policy the saving move" lever). Per self-play move the net-free
  # `engine::tactics` solver proves the side-to-move's forced win and SOFT-blends
  # visit mass onto the proving move into the POLICY target (generalises the O1
  # one-hot above to a deep search + soft injection + off-window multi-window
  # decode). Default OFF — byte-identical hot path. The D-WS3 smoke variant
  # (configs/variants/z2_solver_in_loop.yaml) flips `solver_enabled: true`.
  # solver_visit_weight < 1.0 = SOFT (the design forbids one-hot — destructive);
  # solver_neighbor_dist = quiet-move widening (< 0 → threat-only); solver_depth
  # in PLIES (~2x mate-distance-in-turns); solver_node_budget caps per-move work.
  # These keys must stay OUT of orchestrator RESUME_CHECKPOINT_OWNED_KEYS so a
  # resumed variant keeps its solver values.
  solver_enabled: false
  solver_depth: 16
  solver_node_budget: 50000
  solver_neighbor_dist: 2
  solver_visit_weight: 0.3

  # Gumbel MCTS search (Danihelka et al., ICLR 2022 §3.3-3.4).
  # Replaces PUCT exploration at root with Gumbel-Top-k sampling and Sequential
  # Halving budget allocation. Non-root nodes still use PUCT + dynamic FPU.
  # Largest quality gain at low sim counts (50-sim fast games).
  # Override via --variant gumbel_full.
  gumbel_mcts: false          # baseline; enable explicitly via variant
  gumbel_m: 16                # number of root candidates (paper default)
  gumbel_explore_moves: 10    # first N plies use visit-count sampling for exploration

  n_workers: 14
  inference_batch_size: 64
  inference_max_wait_ms: 4.0   # sweep P3 winner (was 12.0, see sprint §69)
  leaf_batch_size: 8            # sweep §69: leaf_bs=16 hurts throughput
  # 2026-04-25 dispatch profile (project_dispatch_pyspy_2026-04-25.md):
  # InferenceServer was ~33% blocked in Python module dispatch at L208 of
  # inference_server.py. Tracing the eval-mode forward via torch.jit.trace
  # collapses ~100 _call_impl invocations per forward into a single graph.
  # Default ON. Falls back to the untraced module if trace fails.
  trace_inference: true
  replay_buffer_capacity: 500000
  max_game_moves: 150  # PLIES (stone placements) = 75 compound turns. §144: recalibrated from 100 (artifact raised draw_rate to 0.84).
  results_queue_cap: 10000  # Rust SelfPlayRunner drops oldest when `results` VecDeque exceeds this.
                            # Visible via positions_dropped getter; bump if dashboard shows nonzero drops.

  # §115: first N plies of every self-play game are random legal moves, NOT
  # MCTS. Rows produced by these plies are skipped (no training target) —
  # purpose is off-canonical early-game state diversity downstream.
  # Mirrors eval.yaml:eval_random_opening_plies (§80). 0 disables.
  random_opening_plies: 1

  # §130: per-game rotation across the 12-element hex dihedral group. Each
  # self-play game samples one sym_idx ∈ [0, 12) at game start; the rotation
  # is applied to NN inputs (forward scatter), the returned policy (inverse
  # scatter — MCTS keeps a canonical-frame view), and to the recorded
  # state/chain/policy/aux tensors so the buffer stores the rotated frame.
  # Closes §121 Component 1 (within-turn directional heuristic was the
  # rotation-equivariant component; permanent self-play rotation washes it
  # out). Eval and bot paths construct SelfPlayRunner with this flag forced
  # to false (default in the Rust ctor) — they play real-board games.
  rotation_enabled: true

  # §156 / Q2 — per-game LEGAL_MOVE_RADIUS jitter ∈ {4, 5, 6}.  Sole
  # confirmed lever on the Class-4 stride-5 fixed point (§152 Q2 verdict);
  # mitigates the §156 R12 cosine-removal colony-attractor signature
  # (held colony fraction at trace levels in the §157 5k validation
  # smoke).  Propagated to top-level default in §157 Gate 5 — no downside
  # observed in any phase that ran with it on.  Set false to restore
  # the §145 fixed radius=5 behaviour.
  legal_move_radius_jitter: true

  playout_cap:
    # Game-level playout cap (fast_prob / fast_sims / standard_sims) is mutually
    # exclusive with the move-level cap (full_search_prob). Pool init raises if both
    # are non-zero. Set fast_prob to 0.0 when using full_search_prob > 0.
    fast_prob: 0.0
    fast_sims: 64          # scalar used by Rust SelfPlayRunner — floor raised from 50 (A3 fix)
    standard_sims: 200
    # §156 R12 verdict (2026-05-06): cosine temperature schedule is
    # LOAD-BEARING for the warm-start smoke regime — cosine ON under
    # warm-start (frozen bootstrap + smoke MCTS regime) reproduces the
    # §155 R10 91% draw lock. Disabling cosine collapses the lock
    # 91→5% but lights up the §147 v5 / §154 v9 colony attractor (R12
    # 67% colony rate). Mitigated by `selfplay.legal_move_radius_jitter:
    # true` (§157 PROPAGATED) + `gating.bootstrap_floor.enabled: true`
    # (§157 PROPAGATED).
    #
    # Default flipped OFF 2026-05-18 (§S178 operator override): all
    # production variants (vast/v6_sustained/v6_sustained_s177/
    # v6_botmix_s178/v7mw_sustained) already opted out explicitly;
    # cosine-on default was a foot-gun for new sustained variants.
    # Cold-start runs that want cosine annealing must now opt IN via
    # variant (`temperature_threshold_compound_moves: >0` + lower
    # `temp_min`). See `configs/variants/vast.yaml` line 53 for the
    # canonical cosine-OFF anchor shape.
    temperature_threshold_compound_moves: 0  # OFF — cosine annealing disabled by default (was 10 / §143 γ.1)
    temp_min: 0.5       # fixed τ when cosine OFF; floor temperature for cosine when threshold > 0
    zoi_enabled: true    # restrict move sampling to ZOI of last N moves
    zoi_lookback: 16     # number of recent moves used as ZOI anchors
    zoi_margin: 5        # hex-distance threshold for ZOI inclusion

    # Move-level playout cap for selective policy loss (KrakenBot-style).
    # Each move independently draws full or quick search. Policy loss is applied only
    # on full-search positions; value/chain/aux losses apply to all positions.
    # Set full_search_prob: 0.0 to disable (all positions treated as full-search).
    n_sims_quick: 100       # sims for quick-search moves (value/chain only)
    n_sims_full: 600        # sims for full-search moves (all losses including policy)
    full_search_prob: 0.5   # §115: 0.25 → 0.5 per Phase 3 discriminator (Smoke A supported
                            # loss-gate; H_early dropped from 4.5+ → 3.97 at fsp=0.5 vs baseline
                            # 5.4+ at fsp=0.25). Doubles self-play policy-gradient contribution.
                            # Expected throughput regression ~25-30%.
