
# default.yaml — standard AlphaZero hyperparameters for Hex Tac Toe

# Model
model:
  board_size: 19
  in_channels: 18
  res_blocks: 12
  filters: 128
  se_reduction_ratio: 4

# MCTS
mcts:
  n_simulations: 800
  c_puct: 1.5
  dirichlet_alpha: 0.3
  epsilon: 0.25
  temperature_threshold_ply: 30

# Self-play
selfplay:
  n_workers: 6
  n_simulations: 80
  inference_batch_size: 64
  inference_max_wait_ms: 12.0
  dispatch_wait_ms: 2.0
  leaf_batch_size: 16
  replay_buffer_capacity: 500000

  opponent_mix:
    self_play_fraction: 0.80
    sealbot_fraction: 0.20
    sealbot_time_limit_ms: 500  # randomised ±200ms for non-determinism

  playout_cap:
    fast_prob: 0.25
    fast_sims: 50
    standard_sims: 400
    temperature_threshold_compound_moves: 15

# Training
training:
  batch_size: 256
  min_buffer_size: 256
  training_steps_per_game: 2.0
  max_train_burst: 8
  lr: 0.002
  weight_decay: 0.0001
  lr_schedule: cosine
  eval_interval: 100
  checkpoint_interval: 50
  log_interval: 10        # also controls web-dashboard send frequency
  aux_opp_reply_weight: 0.15

  game_length_weights:
    thresholds: [10, 25]
    weights: [0.15, 0.50]
    default_weight: 1.0

  buffer_schedule:
    - {step: 0,         capacity: 250_000}
    - {step: 500_000,   capacity: 500_000}
    - {step: 1_500_000, capacity: 1_000_000}

  mixing:
    pretrained_buffer_path: "data/bootstrap_corpus.npz"
    decay_steps: 1_000_000
    min_pretrained_weight: 0.1
    initial_pretrained_weight: 0.8

evaluation:
  enabled: true
  progress_every: 1
  random_n_games: 10
  sealbot_n_games: 5
  sealbot_time_limit: 0.03
  random_model_sims: 96
  sealbot_model_sims: 128
  enable_best_arena: false
  best_n_games: 20
  best_promotion_winrate: 0.55
  best_current_model_sims: 128
  best_opponent_model_sims: 128
  best_model_path: checkpoints/best_model.pt

# Rewards
rewards:
  shaped_decay_steps: 500
  # Note: Formation rewards are handled in python/training/formation_rewards.py

# Analysis
analysis:
  track_winrate_by_side: true
  expected_o_winrate: 0.52

# Bootstrap
bootstrap:
  enabled: true
  corpus_path: "data/bootstrap_corpus.npz"
  n_games: 20000
  human_games_min_moves: 20
  human_games_rated_only: true
  sealbot_time_mix: {0.03: 0.7, 0.1: 0.3}

# Seed
seed: 42
