# §169 A4 — v8 bbox encoding + canvas_realness mask + PartialConv2d trunk entry.
#
# Diagnostic arm: same B1 architecture (128×12 + GPool {6,10} + KataGo policy
# head) and same v8 wire format (11 planes × 25×25, no pass slot). Only deltas
# vs. B1 are:
#   - plane 8 polarity inverted from off_window (1=outside) to canvas_realness
#     (1=inside). See `hexo_rl/bootstrap/dataset_v8.py:_get_plane8_mask`.
#   - trunk-entry conv wrapped in `PartialConv2d` (Innamorati 2018 partial-conv-
#     padding). See `hexo_rl/model/partial_conv.py`.
#   - downstream gpool sites consume plane 8 directly (no off→mask inversion).
#
# Hypothesis: if A4 closes most of the K-cluster vs bbox SealBot WR gap (B1 0%
# argmax vs A1 v6w25 14.5%), the bbox arm's loss was bad zero-padding semantics
# at trunk entry — bbox direction lives. If A4 closes little, the loss is
# structural and §169 commits to the K-cluster line.

arm: A4
description: v8 bbox encoding + canvas_realness mask + PartialConv2d trunk entry
sprint: "§169"

encoding: v8
board_size: 25
in_channels: 11
n_actions: 625
filters: 128
res_blocks: 12
gpool_sites: "6,10"
head_use_gpool: true
se_reduction_ratio: 4

# §169 A4 architectural deltas
canvas_realness: true

corpus_npz: data/bootstrap_corpus_v8_canvas_realness.npz

# Match the §168 v6w25 anchor recipe + §167 B1 v8 retrain — 30 ep cosine, peak
# 2e-3, eta_min 5e-5, batch 256. Carries the §167 NaN-skip patch (forward-side
# non-finite skip + scheduler step + step counter advance) automatically; the
# patch lives in `hexo_rl/bootstrap/pretrain.py` and applies to all v8 retrains.
batch_size: 256
epochs: 30
lr_peak: 2.0e-3
eta_min: 5.0e-5
label_smoothing: 0.05
aux_opp_reply_weight: 0.15

artefacts:
  checkpoint: checkpoints/ablation_169/A4_canvas_realness.pt
  pretrain_log: reports/ablation_169/A4_pretrain.log
  eval: reports/ablation_169/A4_eval.json
  threat_probe: reports/ablation_169/A4_threat.json
  bench: reports/ablation_169/bench_per_arm.md

# Hard surface conditions per §169 A4 prompt + §167 B1 precedent:
#   - Subspike SE × PartialConv compatibility — already gated PASS pre-retrain
#     (audit/encoding_spikes/s4_a4_se_partial_conv.py: full-model b=1 Δ +0.51%
#     within noise; SE on PC outputs finite; off-canvas zeros preserved at the
#     partial-conv layer). Audit/ is gitignored — check the local artifact or
#     reproduce by re-running the script.
#   - final loss > 5.36 (anchor 3.57 × 1.5 — same threshold A1/A2/A3 used).
#   - NaN-skip rate > 30% even with the §167 patch + operator dtype.
#   - A4 argmax > 12% vs SealBot (>80% of B1-vs-A1 gap closed): SURFACE,
#     do not STOP — keep eval moving (matched MCTS becomes critical).
hard_stop:
  final_loss_gt: 5.36
  nan_skip_pct_gt: 30
  surface_argmax_gt_pct: 12   # >80% of bbox-vs-K-cluster gap closure (A1 14.5%)

eval_matrix:
  argmax:
    legal_radius: 8
    n_games: 200
  mcts_n:
    n_games: 200
    n_sims: operator_chosen     # default 128 per §169 P1 estimate

# v8 fixture is the canonical threat probe target (per §169 A4 prompt:
# "v8 fixture if regen completed (operator decision); else argmax-only
# threat probe captured but not gating"). The pre-existing v8 fixture
# at fixtures/threat_probe_baseline.json is 19×19 (v6 only). v8 fixture
# regen is a §170 follow-up; A4 threat probe defaults to skipped.
threat_probe:
  status: skipped
  reason: "v8 fixture regen is a §170 follow-up — same gap as A2/A3; not a §169 blocker."
