# monitoring.yaml — dashboard and alerting settings

monitoring:
  enabled: true
  terminal_dashboard: true
  web_dashboard: true
  web_port: 5001
  log_interval: 10
  event_log_maxlen: 500
  alert_entropy_min: 1.0
  alert_grad_norm_max: 10.0
  alert_loss_increase_window: 3
  alert_entropy_warn: 2.0
  ema_alpha: 0.06
  training_step_history: 2000
  game_history: 500
  num_actions_for_entropy_norm: 362  # derived from encoding if omitted; v6=362, v6w25=626
  p0_win_rate_target_low: 54.0
  p0_win_rate_target_high: 58.0
  viewer_max_memory_games: 50
  viewer_max_disk_games: 1000
  # §101 — gate D-Gumbel / D-Zeroloss instrumentation (7 policy-target metrics
  # on training_step). <0.2% step-time cost on a 100 ms step.
  log_policy_target_metrics: true
  # §107 — I1 colony-extension detector + I2 cluster variance metrics.
  # Rust-side I2 accumulates inside hot MCTS loop; I1 is pure Python per-game.
  # Disable on bench runs (adds <1% overhead but perturbs timing).
  log_investigation_metrics: true

# ── B4 §D-DECIDE Track-B — run-feed reader (READ-ONLY consumer of Feed A) ──
# Single source of truth for the d1m_monitor / run_feed_reader run identity +
# Feed-A parse knobs. load_run_feed_config() HARD-ERRORS when this block (or any
# required key) is missing — NO silent 'logs/d1m/...jsonl' default. Env overrides
# (D1M_HOST / D1M_REPO / D1M_LOG / D1M_ENCODING) still win at the call site; this
# block is the floor, not a fallback to a buried literal.
run_feed:
  # run identity (was hardcoded at d1m_monitor.py:149 + 1431-1433)
  host: vast                          # ssh host alias (D1M_HOST)
  repo: /workspace/hexo_rl            # remote repo root (D1M_REPO)
  # Current live run. Named via `--run-name run2_mw_fresh`, so this path is
  # STABLE across restarts (always the latest events of the active run). Override
  # any other log with the D1M_LOG env var. (Was the retired D-1M run:
  # logs/d1m/d1m_gumbel_m16_n150.jsonl.)
  default_log_path: logs/run2_mw_fresh.jsonl  # run-log path, relative to repo (D1M_LOG)
  encoding: v6_live2_ls               # run encoding -> derived entropy upper ref (D1M_ENCODING)
  # sealbot_slope CI knobs (load-bearing — VERBATIM from d1m_monitor.py)
  sealbot_slope_min_points: 5         # K — false-green guard; < K -> neutral
  sealbot_slope_ci_level: 0.95        # two-sided CI level
  sealbot_min_rise: 0.03              # +3pp effect-size floor over the window
  sealbot_fallback_sigma: 0.12        # conservative per-point sigma when CI absent
  # parse sampling / binning (mirror the REMOTE collector constants)
  bin_width: 12500                    # step-bucket width for binned trajectories
                                      # (12.5k = half the 25k eval/signature cadence
                                      #  -> 2 trajectory points per eval round; was 30000)
  ts_sample: 200                      # sample every Nth train_step (value-bce trajectory)
  gc_sample: 50                       # sample every Nth game_complete (colony trajectory)
