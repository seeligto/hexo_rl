# model.yaml — model architecture hyperparameters
# Single source of truth for all architecture dimensions.
# Never override these in other config files.

board_size: 19
# 8 = cur ply-0..3 + opp ply-0..3 (HEXB v6 wire format).
# Chain-length planes (Q13) are output-only auxiliaries; not in input.
in_channels: 8
res_blocks: 12
filters: 128
se_reduction_ratio: 4

# §166 v8 encoding gate. Default "v6" preserves pre-§166 behavior byte-exact.
# Set to "v8" / "v6w25" / etc. to route a different encoding pipeline. The
# registry (engine/src/encoding/registry.toml) is the source of truth for
# board_size, n_planes, cluster geometry, etc.; the scattered scalars above
# (`board_size`, `in_channels`) MUST stay consistent with the registry's
# entry — `resolve_from_config` rejects disagreement (§172 A4.5 design §10).
#
# §172 A4.5 canonical: string form (mapping form `encoding: { version: v6 }`
# also still accepted for backward compat by both the new resolver and the
# legacy `hexo_rl.utils.encoding.resolve_encoding`).
encoding: v6

# Distributional value head (E1). Default 'scalar' = current BCE head (byte-exact).
# Set 'dist65' to enable the 65-bin two-hot cross-entropy head.
value_head_type: scalar
n_value_bins: 65

# E1 warm-start value head (T8). Default DISABLED = byte-identical for every
# non-E1 launch (the launch hook maybe_warmstart_value_head is a no-op).
# The E1 arm variants set enabled: true + head_dir: <HEADSWAP ab dir>. The
# concrete head FILE is selected in code from value_head_type (scalar ->
# arm_A_seed0, dist65 -> arm_B_seed0), NOT declared here — so the two arm
# yamls differ ONLY in model.value_head_type (the one-key-diff invariant).
warm_start:
  enabled: false
  head_dir: null
