eval_pipeline:
  enabled: true
  eval_interval: 2500
  report_dir: reports/eval
  db_path: reports/eval/results.db
  ratings_plot_path: reports/eval/ratings_curve.png
  opponents:
    best_checkpoint:
      enabled: true
      stride: 1                # gate cadence = training.yaml:eval_interval × stride
      # n_games raised 200 → 400 per calibration 2026-04-17:
      # at threshold 0.55, n=400 gives binomial stderr ≈ 2.5% (vs 3.5% at
      # n=200), comfortably below the <3% target in the graduation-gate
      # calibration report. Eval wall-cost rises from ~36 min to ~70 min
      # per round, offset by training.yaml:eval_interval=5000.
      # Report: reports/graduation_calibration_2026-04-17.md
      # 200 → 100 (operator request 2026-04-19, §107 run): halve eval wall cost
      # on laptop at the mid-run monitoring stage. At n=100, binomial stderr
      # at threshold 0.55 is ≈ 5%. Wall cost ≈ 18 min/round (laptop 14-worker).
      # Prior comments (200 for desktop, 400 from §101.a calibration) kept
      # below for traceability — raise back to 200+ if gate-fire rate drifts.
      n_games: 100
      model_sims: 128
      opponent_sims: 128
    sealbot:
      enabled: true
      # Generalization monitor — fires every eval round; n_games sized for
      # Wilson95 half-width ~10pp at p≈0.55. Smoke variants override n_games
      # for speed (see m173_alpha_cold_smoke.yaml, smoke_radius_curriculum.yaml).
      stride: 1
      n_games: 100
      think_time_strong: 0.5
      think_time_fast: 0.1
      model_sims: 128
    random:
      enabled: true
      stride: 1
      n_games: 20
      model_sims: 96
    # §155 T2 — multi-anchor bootstrap floor opponent.  Frozen reference
    # (the canonical bootstrap by default) used by the bootstrap-floor
    # promotion gate to catch v9-style colony-attractor regressions where
    # the trainer reaches a local optimum that beats the rotating best
    # anchor 86–91% but loses 199/200 vs SealBot.  Default disabled —
    # variants opt in via `enabled: true` plus `gating.bootstrap_floor`.
    # When opting in, set ``stride`` to match best_checkpoint so a
    # measurement is always available on promotion-eligible rounds.
    bootstrap_anchor:
      # §157 Gate 6 — enabled by default.  Pair partner of
      # `gating.bootstrap_floor.enabled: true` below; both must be true
      # together (gate-only without opponent triggers missing-measurement
      # block on every promotion).
      enabled: true
      stride: 1
      n_games: 100
      model_sims: 128
      opponent_sims: 128
      # §157 Gate 6 — frozen v7full reference, NOT the rotating canonical
      # bootstrap.  The whole point of the floor is to catch regressions
      # against a known-good baseline; rotating self-updates the reference
      # below v7full on the first sub-floor promotion and locks in the
      # regression the gate was meant to catch.  Operators rolling a new
      # bootstrap should explicitly re-pin this path to the new reference
      # only after independently validating the new bootstrap ≥ v7full WR
      # vs SealBot.
      path: checkpoints/bootstrap_model_v7full.pt
    # §P6 — Hammerhead minimax+NNUE second ladder opponent (eval-only, vendored
    # at vendor/bots/hammerhead).  A LOWER rung than SealBot: reads whether the
    # SealBot WR ceiling is a GENERAL strength plateau (NNUE WR >> SealBot WR)
    # or a SealBot-SPECIFIC overfit (NNUE WR ~= or < SealBot WR despite NNUE
    # being the weaker bot).  DEFAULT OFF so an in-run 30k stays single-variable
    # — the NNUE read is taken standalone on the final checkpoint via
    # `scripts/run_sealbot_eval.py --opponent nnue`.  Enable for an in-run
    # second-opponent ladder. time_per_stone_ms mirrors SealBot think_time_strong
    # (0.5s) so the two rungs are budget-comparable; tune to match however the
    # operator measured NNUE's ~6% vs SealBot.
    nnue:
      enabled: false
      stride: 1
      n_games: 100
      time_per_stone_ms: 500
      model_sims: 128
  gating:
    promotion_winrate: 0.55
    best_model_path: checkpoints/best_model.pt
    # §D-LOOPFIX W2 — OPTIONAL incumbent pin. When set to a sha256 hex string the
    # launch preflight (resolve_anchor) recomputes the deterministic state-dict
    # sha256 of the RESOLVED best_model.pt weights and HARD-FAILS the run on
    # mismatch — the gate the silent restore-from-.bak drove straight through,
    # installing golong@50k-PEAK as the A/B incumbent + self-play generator.
    # Absent/null = no pin (the identity line is still logged as
    # `anchor_identity`). A/B + sustained runs SHOULD pin; compute the value with
    #   python scripts/anchor_sha256.py checkpoints/<intended_incumbent>.pt
    # The pin is a LAUNCH-time assertion of the intended incumbent. On a RESUME
    # after promotions, best_model.pt has legitimately advanced past the pinned
    # launch incumbent → the pin will hard-fail; that is EXPECTED — update the pin
    # to the current best_model.pt sha (or clear it) for the resume. The fixed-loop
    # A/B + sustained runs run to completion (W1 close-out), so this rarely arises.
    # expected_anchor_sha256: "<sha256-hex>"
    # §155 T2 — promotion AND-gate against a frozen bootstrap reference.
    # When enabled, requires `wr_bootstrap_anchor >= min_winrate` in
    # addition to the existing best-checkpoint gates.  Missing measurement
    # blocks promotion (defensive default).  Pair with
    # `opponents.bootstrap_anchor.enabled: true` and matching stride.
    bootstrap_floor:
      # §157 Gate 6 — enabled by default.  Pair partner of
      # `opponents.bootstrap_anchor.enabled: true` (frozen v7full path)
      # above.  Promotion AND-requires `wr_bootstrap_anchor ≥ min_winrate`
      # in addition to the existing `wr_best ≥ promotion_winrate` and
      # `ci_lo > 0.5` gates.  Defensive default: missing measurement =
      # block.  §155 T2 design intent — catch the v9 Class-5 colony-
      # attractor signature where the trainer beats its rotating best
      # while losing to v7full.
      enabled: true
      min_winrate: 0.45
  colony_centroid_threshold: 6
  bradley_terry:
    anchor_player: checkpoint_0
    regularization: 1.0e-06
  eval_temperature: 0.5
  eval_random_opening_plies: 0  # §174: was 4 — inflated WR by giving free positional advantage
  eval_seed_base: 42

  # §P6→O1→PRELONG — prolonged-run eval-cost cadence profiles. CONFIG-ONLY /
  # declarative: values live here (SoT), no literals in source. The prolonged-run
  # variant selects a profile by overriding the keys it names (eval_interval, the
  # `opponents.*.{enabled,stride,n_games}`, eval_temperature, random_opening_plies);
  # the eval pipeline is NOT yet wired to read `eval_profiles` directly — that
  # 1-line selection hook is flagged for the arch-finalization session (do NOT
  # infer these are active on the base config; base behaviour above is unchanged).
  #
  # P1 (PRELONG canonical-eval-profile FIX, 2026-06-04): each profile pins ONE
  # `random_opening_plies` applied IDENTICALLY across every temperature in
  # `temperatures`. This is the FIX for the O1-smoke artifact class, NOT just a
  # cost knob: the "1.8× soft-policy gap" was greedy@plies-4 vs sampled@plies-0
  # (mismatched opening-plies across temps), which dissolved to 1.28× under
  # matched measurement (v6_live2_o1_smoke_result_2026-06-04.md). NEVER compare
  # WR across mismatched opening-plies. The standalone gate
  # (`scripts/run_sealbot_eval.py`) MUST pass `--random-opening-plies` equal to
  # the active profile's value so in-run and standalone reads are commensurable.
  # Canonical value = 0 (§174: plies-4 inflated WR via free positional advantage;
  # base `eval_random_opening_plies: 0` matches).
  #
  # Intent: cut eval wall-cost on the long run — a cheap SealBot-only greedy
  # monitor most rounds, a full dual-opponent dual-temp read at milestones.
  # The abort gates (grad-norm, stride5 spam, SealBot-WR) live in
  # monitors.yaml / the eval pipeline and fire independently of which profile is
  # active — note only that the SealBot-WR abort is *evaluated* at the active
  # profile's cadence (every 10-15k under `cheap`, vs 2500 base).
  #
  # P2 (PRELONG long-run cadence): `cheap` interval raised to the operator's
  # 10-15k band; the n=50/n=100 SealBot-WR is a NOISY trend monitor (Wilson95
  # half-width ~14pp at n=50 / ~10pp at n=100) — too wide to STEER a 300k run.
  # Steer on the SMOOTH metrics instead (internal-elo, policy/value loss,
  # draw-rate-vs-intrinsic ~0-2% SealBot floor); demote SealBot-WR to the
  # periodic stringent `milestone` CHECK.
  eval_profiles:
    cheap:                      # frequent low-cost in-run monitor (P2 steering = smooth metrics, NOT this WR)
      eval_interval: 12500      # every 12.5k steps — operator 10-15k band (5× base 2500)
      opponents: [sealbot]      # SealBot only (drops best_checkpoint/anchor/nnue/random)
      n_games: 50               # Wilson95 half-width ~14pp — a NOISY trend monitor, not a gate/steer
      temperatures: [0.0]       # single temp (greedy)
      random_opening_plies: 0   # P1: pinned; applies to ALL temps above (§174 canonical)
    milestone:                  # periodic thorough read (the stringent SealBot-WR CHECK)
      eval_interval: 25000      # every 25k steps
      opponents: [sealbot, nnue]
      n_games: 200              # Wilson95 half-width ~7pp
      temperatures: [0.0, 0.5]  # both temps — exposes the greedy/sampled gap (matched opening-plies)
      random_opening_plies: 0   # P1: pinned; SAME value for BOTH temps (kills the 1.8× artifact class)
