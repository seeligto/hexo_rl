# configs/variants/v6_botmix_s181_track_b.yaml
# §S181-AUDIT Wave 1 Track B — instrumented 3000-step short run.
#
# Recipe identical to v6_botmix_s180b_3knob_escalation.yaml; single delta is
# Track B instrumentation flags (B1 grad-norm attribution + B2 buffer
# position-class snapshot at every checkpoint). Step cadence 500 → ladder
# of 7 checkpoints (500, 1000, ..., 3000) covers the 86%-collapse window.
#
# Pre-registered verdict (LITERAL L13, §S181-AUDIT prompt V-B-{A..E}):
#   V-B-A  one source ≥ 60% of total colony-pushing grad pull
#          → source-targeted lever (refresh hook OR pretrain re-weight OR PSW)
#   V-B-B  all three sources 25-45% each, all colony-pushing by step 500
#          → multi-source damping (EMA + entropy already on; add ply-to-end
#            aux + 2-stone aux + per-class target temp)
#   V-B-C  buffer becomes colony-heavy by step 2k
#          → feedback loop confirmed; refresh hook + EMA priority
#   V-B-D  trunk centroids collapse (≥ 50%) by step 1k
#          → trunk co-adaptation; aux heads forcing discrimination required
#   V-B-E  none match cleanly → escalate; no real-run launch
#
# Cost. ~3000 × ~7-9 s/step × 1.3× attribution slowdown ≈ 6 h on vast 5080.
#
# Launch:
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v6.pt \
#     --variant v6_botmix_s181_track_b \
#     --iterations 3000

# ── §S180b base — bootstrap anchor + variant identity ────────────────────
lr: 2e-3
total_steps: 100_000
eta_min: 5e-4   # PR-B raised from 2e-4

mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6.npz"
  bot_corpus_path: "data/bot_corpus_s178_sealbot_vs_v6.npz"
  bot_batch_share: 0.30
  bot_corpus_refresh:
    enabled: false
    trigger: best_model_promotion
    cooldown_steps: 25_000
    min_new_games: 200

draw_value: -0.1
ply_cap_value: 0.0

game_length_weights:
  thresholds: [10, 25]
  weights: [1.0, 1.0]
  default_weight: 1.0

selfplay:
  completed_q_values: true
  c_visit: 50.0
  c_scale: 1.0
  n_workers: 18
  inference_batch_size: 64
  n_simulations: 400
  max_game_moves: 150
  random_opening_plies: 1
  rotation_enabled: true
  legal_move_radius_jitter: true
  playout_cap:
    fast_prob: 0.0
    full_search_prob: 0.5
    n_sims_quick: 100
    n_sims_full: 600
    temperature_threshold_compound_moves: 0
    temp_min: 0.5
    zoi_enabled: true
    zoi_lookback: 16
    zoi_margin: 5

buffer_schedule:
  - {step: 0,         capacity: 250_000}
  - {step: 300_000,   capacity: 500_000}

gating:
  bootstrap_floor:
    enabled: true
    min_winrate: 0.45

# Short-run cadence — checkpoint every 500 steps for the 3000-step window.
checkpoint_interval: 500
eval_interval: 10000          # eval irrelevant for instrumented short run
eval_temperature: 0.5
eval_random_opening_plies: 0

eval_pipeline:
  opponents:
    bootstrap_anchor:
      path: "checkpoints/bootstrap_model_v6.pt"
      encoding: v6   # §D-EVALGATE: anchor's OWN encoding — assertion vs its stamp (unstamped anchor otherwise hard-fails when enabled); declare path+encoding in the SAME block
    sealbot:
      enabled: true
    randombot:
      enabled: true
    best_checkpoint:
      enabled: true

hard_abort:
  # §CANARY-VAL 2026-05-31: this `hard_abort:` block is NOT code-enforced
  # (operator-eyeball reference only). The stride-5 spam gate IS now wired
  # via monitors.hard_abort_stride5_p90 (default 30, 3 consecutive eval
  # points) — NOT the stride5_p90 key below. colony_ext_frac_max is
  # metric-insufficient (never reaches 0.40 even at maximal stride-5 spam).
  # Live auto-aborts: stride5 (monitors) + monitors.hard_abort_grad_norm +
  # SealBot-WR (alert_rules.check_sealbot_wr_hard_abort).
  grad_norm: 10.0
  loss_nan: true
  stride5_p90: 60
  row_max_p90: 50
  colony_ext_frac_max: 0.40
  draw_rate_warn: 0.70
  pct_at_cap_warn: 0.30

telemetry:
  emit_bot_corpus_metrics: true
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

# ── §S181-AUDIT Track B instrumentation (SINGLE DELTA vs §S180b) ─────────
# B1 — per-source gradient-norm attribution. Adds ~3× per-step cost
# (3 extra slice backwards via retain_graph). Logs structured event
# `per_source_grad_norm` with `{trunk,value,policy}_{pretrain,recent,uniform_self}`
# L2 norms each training step.
track_b_grad_attribution: true

# B2 — selfplay buffer position-class snapshot at every checkpoint save.
# Samples 5000 positions from the live ReplayBuffer, classifies each
# (colony / extension / neither) using the Track A classifier, and emits
# a `buffer_position_class_snapshot` event with per-class fractions +
# per-class mean value_target.
track_b_buffer_snapshot: true
track_b_buffer_snapshot_n: 5000
