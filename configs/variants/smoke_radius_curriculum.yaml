# configs/variants/smoke_radius_curriculum.yaml
#
# §174 smoke: validates radius curriculum with early transition at 5K steps.
# Inherits from vast.yaml; overrides only radius schedule + eval cadence.

# Encoding
encoding: v6w25

# Training — LR + gradient
lr: 0.001
grad_clip: 1.0
training_steps_per_game: 2.0
max_train_burst: 8

# Buffer growth schedule (§173 P0 decision #4)
buffer_schedule:
  - {step: 0, capacity: 250000}

# Selfplay — 5080 tuned (§174 sweep 2026-05-12)
selfplay:
  gumbel_mcts: false
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  leaf_batch_size: 8
  max_game_moves: 150
  legal_move_radius_jitter: true
  # §174 smoke: R=5→6 at 5K steps for fast validation.
  legal_move_radius_schedule:
    - {step: 0, radius: 5}
    - {step: 5000, radius: 6}
  random_opening_plies: 0
  playout_cap:
    fast_prob: 0.0
    temperature_threshold_compound_moves: 0
    temp_min: 0.5

# MCTS
mcts:
  n_simulations: 400

# Eval — every 5K (before and after radius change)
eval_interval: 5000

eval_pipeline:
  opponents:
    sealbot:
      n_games: 20
      model_sims: 128
    best_checkpoint:
      n_games: 20
      model_sims: 128
      opponent_sims: 128
    bootstrap_anchor:
      n_games: 20
      model_sims: 128
      opponent_sims: 128

# Mixing — corpus resolved by encoding registry (v6w25 → bootstrap_corpus_v6w25.npz)
mixing:
  pretrained_buffer_path: "<auto>"

# Monitoring — dashboard ON (no --no-dashboard flag)
monitors:
  hard_abort_grad_norm: 10.0
