# configs/variants/phase_b_mgate_m32.yaml
#
# §D-LONGRUN-READY Phase B — m-gate discriminator Arm-m32.
#
# ONE variable vs phase_b_mgate_m8/m16: gumbel_m = 32 (broadest, shallowest).
# At fixed n=100, m=32 → 5 SH phases, most root candidates, fewest sims/candidate.
# This is the as-run Gumbel-opt-50k config (m=32, n=100). Used in the m-gate to
# establish the m32 BASELINE — if m8 or m16 beats it, m is a free depth lever.
#
# Context: the affordability test (gumbel_opt 50k) ran at m=32 and reached Elo
# parity with PUCT-15k at 72% cost. The m-gate tests whether m=8 (deeper) pushes
# Gumbel per-step strength toward or past PUCT-600, or whether m32 is already near
# the Gumbel ceiling.
#
# See phase_b_mgate_m8.yaml for full design rationale and read protocol.
#
# LAUNCH (vast, after A2 bootstrap is in place):
#   rm -f checkpoints/best_model.pt{,.bak}
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v6_live2_8300.pt \
#     --variant phase_b_mgate_m32 --iterations 12000 \
#     --checkpoint-dir checkpoints/phase_b_m32

# ── encoding ─────────────────────────────────────────────────────────────────
encoding: v6_live2_ls
in_channels: 4

# ── LR ───────────────────────────────────────────────────────────────────────
lr: 2e-3
eta_min: 5e-4
aux_opp_reply_weight: 0.0

# ── data freshness ───────────────────────────────────────────────────────────
training_steps_per_game: 1.0

# ── selfplay — ONE variable = gumbel_m ───────────────────────────────────────
selfplay:
  completed_q_values: true
  n_workers: 32
  inference_batch_size: 64
  inference_max_wait_ms: 2.0
  leaf_batch_size: 8
  random_opening_plies: 0
  gumbel_mcts: true
  gumbel_m: 32                      # <<< THE VARIABLE — broadest, shallowest
  gumbel_explore_moves: 10
  c_visit: 50.0
  c_scale: 1.0
  playout_cap:
    full_search_prob: 0.5
    n_sims_full: 100
    n_sims_quick: 100

# ── mixing ────────────────────────────────────────────────────────────────────
mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"

# ── eval ──────────────────────────────────────────────────────────────────────
eval_interval: 2500
eval_pipeline:
  opponents:
    best_checkpoint: { enabled: false }
    sealbot:         { enabled: false }
    random:          { enabled: true, stride: 1, n_games: 20 }
    bootstrap_anchor: { enabled: false }
    nnue:            { enabled: false }
    offwindow_adversary: { enabled: false }
  gating:
    expected_anchor_sha256: "ebf2ed39fd64db525864aeade75972372da9418cc8179347afc8cecb60ba6db8"

telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

monitors:
  hard_abort_grad_norm: 10.0
  hard_abort_draw_rate: 0.55
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0
