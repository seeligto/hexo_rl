# gumbel_targets — EPYC 7702 (42 vCPU) + RTX 4080 Super (16 GB) variant.
# Original sweep 2026-04-25 (full 19-cell, n=5, 180s/cell).
# Validate re-sweep 2026-04-25 (post-trace-fix, 6-cell MODE=validate, n=5, 180s/cell).
# Full data: reports/sweeps/sweep_{workers,batch_wait,leaf_burst}_*.csv
#
# Hardware delta vs desktop (Ryzen 7 3700x + RTX 3070 8GB):
#   - 2.5× CPU cores available (42 vs 16 vCPU). n_workers=24 wins post-trace.
#   - 2× VRAM (16 vs 8 GB). batch_size=192 fits comfortably.
#   - GPU ~2× faster on FP16 — but GPU sits at 65% util across every cell,
#     so faster GPU does NOT translate to throughput. Bottleneck unknown post-trace
#     (dispatch eliminated; next suspect is Rust-side submit or MCTS lock contention).
#
# Sweep findings:
#   - trace_inference=true (now default): neutral on 4080S. GPU util unchanged
#     at 65% — dispatch path is NOT the sole bottleneck on this CPU+GPU combo.
#     trace helps on 3070 (+34%); keep it for correctness and other hardware.
#   - trace shifted optimal worker count: n_workers=16 was 388k pre-trace,
#     drops to 234k post-trace (faster NN → workers can't refill batch at w=16).
#     n_workers=24 recovers: 377k median (6-cell validate sweep winner).
#   - inference_max_wait_ms=4.0: validate sweep ran at wait=4.0 (prior winner,
#     locked in stage 1). Batch fill 96-99% → no benefit from longer wait.
#     8.0 was calibrated to compile-path where fill was ~84%; trace fills faster.
#   - torch.compile=true sped up NN inference 1.45× (10.4k → 15.1k inf/s)
#     but worker-pool throughput went DOWN. Compile=off until NN grows.
#
# Best observed: ~377k pos/hr (trace ON, compile OFF, n_workers=24, batch=192).
torch_compile: false
training_steps_per_game: 2.0
selfplay:
  gumbel_mcts: false
  completed_q_values: true
  max_game_moves: 300
  n_workers: 24
  inference_batch_size: 192
  inference_max_wait_ms: 4.0
  leaf_batch_size: 8
  playout_cap:
    fast_prob: 0.0
max_train_burst: 16
