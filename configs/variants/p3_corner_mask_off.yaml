# P3 corner-mask probe — control arm.
# Identical to w4c_smoke_v7_5080.yaml except:
#   - eval_interval bumped to 2500 (per §157 follow-up #1; backlog at 500
#     for 5080 hardware) — final-checkpoint SealBot eval done offline post-run.
#   - model.corner_mask explicitly false (default; recorded for clarity).
#
# Launch:
#   .venv/bin/python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v7full.pt \
#     --variant p3_corner_mask_off \
#     --checkpoint-dir checkpoints/p3_corner_mask_off \
#     --no-dashboard --iterations 1000

training_steps_per_game: 4.0
max_train_burst: 8

eval_interval: 2500   # §157 follow-up #1 — 500 produces eval backlog on 5080.

model:
  corner_mask: false   # P3 control

selfplay:
  gumbel_mcts: false
  completed_q_values: true
  max_game_moves: 150
  n_workers: 18
  inference_batch_size: 224
  inference_max_wait_ms: 8.0
  leaf_batch_size: 4
  playout_cap:
    fast_prob: 0.0
    temperature_threshold_compound_moves: 0
    temp_min: 0.5
  legal_move_radius_jitter: true

eval_pipeline:
  opponents:
    bootstrap_anchor:
      enabled: true
      stride: 1
      n_games: 100
      model_sims: 128
      opponent_sims: 128
      path: checkpoints/bootstrap_model_v7full.pt
  gating:
    bootstrap_floor:
      enabled: true
      min_winrate: 0.45

monitors:
  hard_abort_grad_norm: 10.0

instrumentation:
  enabled: true
  value_probe_interval: 250
  composition_interval: 500
