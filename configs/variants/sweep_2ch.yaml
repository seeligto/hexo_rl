# §122 sweep — 2-channel variant (KrakenBot-style minimal input).
#
# Channel set: {0, 8} — current-player stones, opponent stones.
# No history, no scalar planes (moves_remaining, ply parity).
# Lower bound on what is sufficient to play; comparison anchor for the rest
# of the sweep.
#
# Wire format stays at 18 planes (replay buffer + sym kernels unchanged).
# HexTacToeNet's `input_channels` parameter slices x[:, [0, 8]] before the
# trunk; trunk in_channels = 2.

input_channels: [0, 8]

seed: 12200
run_name: sweep_2ch

# Sweep-specific training horizon (fresh-start cosine over phase 1+2).
total_steps: 10000
eta_min: 2e-4
checkpoint_interval: 500
# Sweep eval cost dominates wall time at eval_interval=500: each round runs
# 100 best_arena games × ~70s + 20 random games ≈ 134 min on a 4080S.
# Phase 1 ends at step 2500; one eval at the end is sufficient for selection.
# Phase 2 (10k steps) gets 3 evals at 5k/7.5k/10k.
# See reports/investigations/phase122_sweep_throughput/memo.md.
eval_interval: 2500
max_checkpoints_kept: 1000
preserve_eval_checkpoints: true

mixing:
  pretrained_buffer_path: data/bootstrap_corpus_sweep_2ch.npz
  decay_steps: 2000
  initial_pretrained_weight: 0.8
  min_pretrained_weight: 0.1
  buffer_persist: false

# Sweep is fresh-start every variant — no buffer restore from earlier runs.
augment: true

# Fresh-start models have high grad norm in the first ~50-100 steps; the
# default 3.0/5-step gate is too tight. Require a sustained explosion.
monitors:
  hard_abort_grad_norm: 15.0
  hard_abort_grad_norm_steps: 100

# Sweep-mode eval profile (deep-merged onto configs/eval.yaml at load time).
# Production eval at n=100 × ~70 sec/game ≈ 134 min/round; at eval_interval=2500
# the final phase-1 eval would not drain before training exit. n=20 × 64 sims
# completes in well under 5 min and gives binomial stderr ~11% — enough to
# rank-order channel variants.
# See reports/investigations/phase122_sweep_throughput/memo.md.
eval_pipeline:
  opponents:
    best_checkpoint:
      n_games: 20
      model_sims: 64
      opponent_sims: 64
    random:
      n_games: 10
      model_sims: 64
    sealbot:
      enabled: false

# Wait up to 10 min for the step-2500 eval to drain before shutdown so
# wr_best is persisted (otherwise run_sweep.py phase-2 selection has no
# metrics to rank by). Honoured only on stop_step exit, not Ctrl-C.
eval_final_drain_timeout_sec: 600
