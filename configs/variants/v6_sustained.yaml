# configs/variants/v6_sustained.yaml
#
# §175 — v6 sustained selfplay, 100K steps. Run closed-by-interrupt at
# step 70176; superseded by §S178 (`v6_botmix_s178.yaml`). Retained as
# historical baseline for §S178 mechanism-delta comparisons.
#
# Q11 test: does training depth close the SealBot transfer gap?
# §172 B2 ran v7full for 30K with cosine denominator=200K (LR never decayed,
# n=20 eval too noisy for real signal). §175 fixes both:
#   1. total_steps=100K → cosine decays to fine-tune phase by ~50K.
#   2. SealBot n=100 (vs B2 n=20) → real signal, CI discriminates 17.4% anchor.
#
# Bootstrap: checkpoints/bootstrap_model_v7full.pt
#   (v7full §150 anchor; 17.4% vs SealBot n=500; same architecture as v6)
# Encoding: v6 (19×19, 362 logits, 8 planes, single-window) — base default.
#
# Note: bootstrap_model.pt is NOW v6w25 (626 logits). Use bootstrap_model_v7full.pt.
#
# Launch:
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v7full.pt \
#     --variant v6_sustained \
#     --iterations 100000 \
#     2>&1 | tee logs/s175_v6_sustained.log
#
# Or via make:
#   make train BOOTSTRAP=checkpoints/bootstrap_model_v7full.pt VARIANT=v6_sustained \
#     2>&1 | tee logs/s175_v6_sustained.log
#
# Decision gate at 50K: if sealbot WR > 20% → continue; < 5% → ABORT.
# Final verdict at 100K: Q11 training-depth or structural?
#
# Wall budget: ~20 hr on vast 5080 at ~5K steps/hr ($0.207/hr ≈ $4.14).
#
# Hygiene 2026-05-18: redundant-to-base scalars dropped (encoding, lr,
# leaf_batch_size, max_game_moves, legal_move_radius_jitter, fast_prob,
# temperature_threshold_compound_moves, temp_min, mcts.n_simulations, and
# best_checkpoint/bootstrap_anchor n_games/model_sims/opponent_sims).
# See reports/variant_hygiene_audit.md.

# Training — total_steps overrides base 200K for cosine-schedule denominator
# match against 100K run length (B2 failure: 200K denominator on 30K run).
total_steps: 100000

# Eval — 10 rounds over 100K (base eval_interval=5000 would fire 20 rounds).
eval_interval: 10000

# Selfplay — 5080-tuned throughput knobs (from vast.yaml sweep verdict 2026-05-12)
# Override-only against selfplay.yaml; base-equal keys removed per hygiene audit.
selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0       # deterministic from move 1; no free opening diversity
  # NOTE 2026-05-18: cosine-off (temperature_threshold_compound_moves=0,
  # temp_min=0.5) was a §156 R12 lever explicitly set in this variant —
  # since folded into base selfplay.yaml defaults (commit 96337c4), so the
  # block was removed from this file per the hygiene audit. Behaviour
  # unchanged. Sprint-log reference: §156 R12 / §175 cosine-off pairing.

eval_pipeline:
  opponents:
    sealbot:
      stride: 1          # fire every eval_interval=10K (base stride=4 = every 40K)
      n_games: 100       # real signal: 17.4% anchor has CI [10.7%, 25.9%] at n=100

# Explicit v6 corpus path — vast's data/bootstrap_corpus.npz was overwritten
# with v6w25 data during §174 (resolvers._CORPUS_PATHS["v6"] points there).
# data/bootstrap_corpus_v6.npz is the canonical v6 19×19 corpus (2.4 GB).
mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6.npz"

monitors:
  hard_abort_grad_norm: 10.0
