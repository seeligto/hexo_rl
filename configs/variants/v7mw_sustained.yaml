# configs/variants/v7mw_sustained.yaml
#
# §176a — v7mw sustained selfplay, 50K steps.
#
# v7mw = v7full architecture (19×19, 362 logits, 8 planes, 12×128ch) tagged
# as is_multi_window=true in the encoding registry. v7full bootstrap weights
# load directly (identical shapes — 143 keys, zero mismatch). The Board state
# is also identical to v7full (cluster_window=19, cluster_threshold=5,
# legal_move_radius=5) — get_cluster_views() emits K=1 in compact game
# states, K>1 once stones spread beyond 5 hex.
#
# Experiment intent: parallel to §175 v6 sustained, using the same v7full
# bootstrap. Distinguishes the v7mw run from §175 v6 in run metadata.
#
# Bootstrap: checkpoints/bootstrap_model_v7full.pt
#   (v7full §150 anchor; 17.4% vs SealBot n=500; same arch as v7mw)
# Encoding: v7mw (19×19, 362 logits, 8 planes; is_multi_window=true)
#
# Launch:
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v7full.pt \
#     --variant v7mw_sustained \
#     --iterations 50000 \
#     2>&1 | tee logs/s176a_v7mw_sustained.log
#
# Decision gate at 25K: compare SealBot WR vs §175 v6 at matched step.
# Final verdict at 50K: does multi-window labeling produce measurable Δ?
#
# Wall budget: ~10-12 hr on vast 5080 at ~5K steps/hr.
#
# Hygiene 2026-05-18: redundant-to-base scalars dropped (lr, leaf_batch_size,
# max_game_moves, legal_move_radius_jitter, fast_prob,
# temperature_threshold_compound_moves, temp_min, mcts.n_simulations, and
# best_checkpoint/bootstrap_anchor n_games/model_sims/opponent_sims).
# legal_move_radius_jitter previously had an inline annotation noting it
# no-ops on the v7mw multi-window path — that semantics is unchanged with
# the key removed (base default true still no-ops for v7mw). See
# reports/variant_hygiene_audit.md.

# Encoding — v7mw multi-window K-cluster perception at 19×19
encoding: v7mw

# Training — total_steps overrides base 200K for cosine-schedule denominator
# match against 50K run length.
total_steps: 50000

# Eval — 5 rounds over 50K. SealBot fires every round.
eval_interval: 10000

# Selfplay — 5080-tuned throughput knobs (matches §175 v6_sustained).
selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0

# Explicit corpus path — vast's data/bootstrap_corpus.npz was overwritten
# with v6w25 data during §174. data/bootstrap_corpus_v6.npz is the canonical
# v6 19×19 corpus (2.4 GB) and shares its wire format with v7full / v7mw.
mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6.npz"

monitors:
  hard_abort_grad_norm: 10.0
