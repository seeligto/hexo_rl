# w4c_smoke_v7_laptop_preflight — Phase B' v10 §156 Gate 4 laptop validation.
#
# Identical to w4c_smoke_v7_5080 except for hardware-tuned throughput knobs:
# laptop is RTX 4060 Max-Q (8 GB VRAM, 16 logical cores) so n_workers / batch /
# wait are dropped to base selfplay.yaml laptop defaults to fit VRAM and avoid
# 5080-tuned 16GB-batch OOMs.
#
# Same §156 fix (cosine temp disabled, fixed τ=0.5), same Q2 jitter, same
# bootstrap-floor gate.  This variant is the 1k-iter Gate 4 laptop preflight;
# success criteria (last 100 games):
#   - stride5_run P90 < 30
#   - draw_rate < 50%
#   - bootstrap-floor not blocking valid candidates
#
# Launch:
#   .venv/bin/python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model.pt \
#     --variant w4c_smoke_v7_laptop_preflight \
#     --checkpoint-dir checkpoints/w4c_smoke_v7_laptop_preflight \
#     --no-dashboard \
#     --iterations 1000

training_steps_per_game: 4.0
max_train_burst: 8

eval_interval: 500   # match 5080 variant for like-for-like comparison

# §156 preflight is a clean fix-validation smoke; the existing 2.6 GB
# replay_buffer.bin from a prior run would auto-restore and contaminate
# the buffer.  buffer_persist=false: do NOT auto-restore, do NOT save —
# preserves the production buffer for future resumes.  Critical: keys
# live at YAML root, not nested under `training:` (see smoke_A_full_search
# §115 incident where nesting silently shadowed the dict).
mixing:
  buffer_persist: false

selfplay:
  gumbel_mcts: false
  completed_q_values: true
  max_game_moves: 150
  # Laptop hardware values — base selfplay.yaml defaults (n_workers=14,
  # inference_batch_size=64, inference_max_wait_ms=4.0).  Listed here
  # explicitly so a remote rebase doesn't silently bump them.
  n_workers: 14
  inference_batch_size: 64
  inference_max_wait_ms: 4.0
  leaf_batch_size: 4
  playout_cap:
    fast_prob: 0.0
    # §156 R12 fix — disable cosine temperature schedule.
    temperature_threshold_compound_moves: 0
    temp_min: 0.5
  # §152 Q2 — per-game LEGAL_MOVE_RADIUS jitter ∈ {4, 5, 6}.
  legal_move_radius_jitter: true

eval_pipeline:
  opponents:
    bootstrap_anchor:
      enabled: true
      stride: 1
      n_games: 100
      model_sims: 128
      opponent_sims: 128
      path: checkpoints/bootstrap_model_v7full.pt
  gating:
    bootstrap_floor:
      enabled: true
      min_winrate: 0.45

monitors:
  hard_abort_grad_norm: 10.0

instrumentation:
  enabled: true
  value_probe_interval: 250
  composition_interval: 500
