# sprint_172_p3_v7full — §172 Phase B cold smoke (registry plumbing).
#
# Host: 5080 (RTX 5080 16 GB + Ryzen 9 9900X 24t).
# Base config: gumbel_targets_5080_24t.yaml deltas applied directly here.
# Encoding: v7full (§150 anchor; 17.4 % n=500 vs SealBot).
#
# ## Purpose
#
# Cold smoke that exercises v7full sustained selfplay end-to-end on the
# §172 registry-driven path.  Validates that A4 plumbing reaches selfplay
# correctly and that encoding flows variant config → worker spawn → Board
# construction → plane export → model forward → replay buffer.
#
# This variant carries ONLY the canonical `encoding: v7full` key.  No
# scattered overrides (board_size / n_planes / cluster_window_size) — all
# encoding-aware fields read from `engine/src/encoding/registry.toml`
# via resolve_from_config(spec).
#
# ## Pre-registered pass criteria
#
#   - Workers spawn, encoding logs match v7full.
#   - ≥ 100 selfplay games complete.
#   - Buffer fills with v7full-shaped tensors (19×19 / 8 planes).
#   - 200 training steps execute, loss finite.
#   - Eval n=20 argmax in expected band.
#   - pos/hr ≥ 5K (smoke shape).
#
# Hard surface: engine panic / tensor-shape mismatch / worker-spawn timeout
# all STOP the smoke.
#
# ## Eval cadence note
#
# Default `training.yaml:eval_interval=5000` will not fire inside a 1200
# train-step smoke.  Override to 1000 here so at least one round of the
# argmax/sealbot/bootstrap_anchor pipeline executes and the criterion is
# observable.  Sweep guidance ≥ 2500 (`feedback_smoke_eval_interval_min_2500`)
# is for 30k+ sustained runs where eval may overlap; at this regime
# (n_games=20, model_sims=128, fast 5080 inference) one eval round is ~ seconds.
#
# ## Launch (5080)
#
#   .venv/bin/python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v7full.pt \
#     --variant sprint_172_p3_v7full \
#     --checkpoint-dir checkpoints/sprint_172_p3_smoke \
#     --no-dashboard \
#     --iterations 1200

# §172 A4.5 canonical — registry resolves all encoding-derived fields.
encoding: v7full

training_steps_per_game: 4.0
max_train_burst: 8

# Tighten eval so at least one round fires inside this 1200-step smoke.
eval_interval: 1000

selfplay:
  gumbel_mcts: false
  completed_q_values: true
  max_game_moves: 150
  n_workers: 18                 # §138 5080 sweep verdict
  inference_batch_size: 224     # §138 5080 sweep verdict
  inference_max_wait_ms: 8.0    # §138 5080 sweep verdict
  playout_cap:
    fast_prob: 0.0              # smoke: full search every game (cleaner plumbing trace)
  legal_move_radius_jitter: true  # §157 Gate 5 PROPAGATED (v7full radius=5 + jitter ∈ {4,5,6})

mixing:
  # §172 T9 — corpus path resolved by encoding registry (v7full → data/bootstrap_corpus.npz).
  pretrained_buffer_path: "<auto>"

eval_pipeline:
  opponents:
    bootstrap_anchor:
      # Same-encoding (v7full ↔ v7full) — guard semantics standard.
      enabled: true
      stride: 1
      n_games: 20               # smoke: trim from 100 → 20 for fast round
      model_sims: 128
      opponent_sims: 128
      path: "<auto>"            # resolves to checkpoints/bootstrap_model_v7full.pt
    sealbot:
      stride: 1
      n_games: 20               # smoke: trim
    argmax_n:
      enabled: true
      stride: 1
      n_games: 20

monitors:
  hard_abort_grad_norm: 10.0    # §157 Gate 5 defensive default
