# calib_R2 — threshold-only ablation (0.52 vs 0.55 baseline).
# D1=0.52, D2=2500, D3=20000, D4=200.
# Driver: scripts/run_calibration_run.sh R2
# promotion_winrate (D1) + n_games (D4) are patched into configs/eval.yaml by
# the driver before launch; they live in eval_pipeline namespace which is
# loaded by EvalPipeline directly (not merged via load_config).
calib:
  threshold: 0.52
  n_games: 200

selfplay:
  gumbel_mcts: false
  completed_q_values: true
  max_game_moves: 200
  playout_cap:
    fast_prob: 0.0

eval_interval: 2500

mixing:
  decay_steps: 20000
