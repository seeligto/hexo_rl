# Desktop Gumbel MCTS — swept to D3 ceiling (n_workers=10, wait=5ms) 2026-04-16
# Launch: make train VARIANT=gumbel_full
training_steps_per_game: 4.0
max_train_burst: 16
selfplay:
  n_workers: 10
  max_game_moves: 200
  inference_max_wait_ms: 5.0
  gumbel_mcts: true
  gumbel_m: 16
  completed_q_values: true
  playout_cap:
    # fast_prob=0.25: Gumbel Sequential Halving shows largest gains at
    # 30-50 sims (§71). Fast games are meaningful on this variant.
    fast_prob: 0.25
