# ── RUN3 — dist65 production run, FRESH FROM BOOTSTRAP ───────────────────────
#
# DRAFT launch package (D-L run3 convene, docs/handoffs/run3_convene_ruling.md).
# PREP ONLY — do NOT launch until the WP3 GNN-BC verdict is quoted against the
# ruling's outcome mapping (ARCH-NULL/MIXED → this file GOES; ARCH-DOMINANT → HELD).
#
# Base recipe = configs/variants/run2_mw_fresh.yaml (the proven multi-window
# production config; read its comments for the reasoning behind every selfplay/
# mixing/radius/monitor key — they are copied here VERBATIM). run3 = run2 recipe
# + the four ruling deltas below. E1 REVIVE (WP1 GO): value head = dist65.
#
# ── RULING DELTAS vs run2_mw_fresh (the only intended differences) ────────────
#   D1  value_head_type: scalar → dist65 (+ n_value_bins 65)         [E1 REVIVE]
#   D2  promotion_gate_subprocess_isolation: false → true            [run2 stall root fix]
#   D3  in-loop 100k Gumbel strength gate (deploy_strength) DISABLED [ruling]
#       → promotion gated by the 25k / 64-pair / CI>0.5 subprocess gate instead
#   D4  external strength via mantis_pull_eval OFFLINE (not in-loop) [ruling]
#   +   fresh seeded books per stage (operator mints at launch, §10 below)
#
# ── DECISION TO CONFIRM before launch (⚠ load-bearing) ────────────────────────
#   The ruling says "promotion gate 25k / 64-pair / CI>0.5 subprocess-isolated."
#   Mapped below as: eval_interval 25k + deploy_strength stride 1 (every 25k) +
#   a 64-opening paired book (128 games) + require_ci_above_half (CI-lower > 0.5)
#   + promotion_gate_subprocess_isolation true. OPEN: does "64-pair" mean
#   confirm_n=128 over a 64-opening book (my reading, matching E1 WP1's
#   evalfair_r5_v2 64-pair/128-game instrument), or a different pair source?
#   Confirm the book path + confirm_n before launch. See §PROMOTION below.
#
# LAUNCH (real entrypoint; --checkpoint = the minted re-stamped weights-only
# v6_live2_ls bootstrap, exactly as run2 §10 step 3a — NOT the raw bootstrap):
#   .venv/bin/python scripts/train.py \
#     --checkpoint checkpoints/run2_bootstrap_v6_live2_ls.pt \
#     --variant run3_dist65 \
#     --iterations 1000000 \
#     2>&1 | tee logs/run3_dist65.log

encoding: v6_live2_ls
in_channels: 4
lr: 2e-3
eta_min: 5e-4
aux_opp_reply_weight: 0.0
training_steps_per_game: 1.0
total_steps: 1000000        # CosineAnnealingLR T_max; MUST launch with --iterations 1000000
min_buffer_size: 25000      # POSITIONS — real self-play prefill gate (run2 §5)

# ── D1: value head = dist65 (E1 REVIVE, WP1 GO). FLAT top-level (base
# configs/model.yaml carries value_head_type/n_value_bins as flat keys; a nested
# `model:` block would be a silent namespace shadow the variant_validator aborts
# on). See configs/variants/e1_dist65.yaml. ────────────────────────────────────
value_head_type: dist65
n_value_bins: 65

# ── D2: promotion-gate CUDA isolation ON (run2 eval-boundary livelock root fix;
# step_coordinator.py:313, docs/designs/e1_promotion_gate_cuda_isolation.md). ───
promotion_gate_subprocess_isolation: true

selfplay:
  completed_q_values: true
  n_workers: 24
  inference_batch_size: 64
  inference_max_wait_ms: 2.0
  leaf_batch_size: 8
  random_opening_plies: 0
  gumbel_mcts: true
  gumbel_m: 16
  gumbel_explore_moves: 10
  c_visit: 50.0
  c_scale: 1.0
  playout_cap:
    full_search_prob: 1.0
    n_sims_full: 150         # ruling: sims 150
    n_sims_quick: 150

  # run2's exact radius curriculum (schedule mechanism; legal_move_radius_jitter
  # is dead code for registry-spec encodings — see run2_mw_fresh §Decision 2).
  legal_move_radius_schedule:
    - {step: 0,      radius: 4}
    - {step: 200000, radius: 5}
    - {step: 400000, radius: 6}
    - {step: 600000, radius: 8}

  # Solver / seeding OFF at launch (run2 Decision 3 default; flips only on a
  # GENERALIZES smoke verdict — not in scope for run3's launch).
  solver_enabled: false
  forced_win_policy_enabled: false
  seed_fraction: 0.0
  seed_corpus_path: null

mcts:
  dirichlet_enabled: false   # no-op on the Gumbel branch (kept for hygiene parity)

mixing:
  # WP0.4: routed through the single resolver (resolve_corpus_path,
  # hexo_rl/encoding/resolvers.py) instead of hardcoding the NPZ path —
  # resolves to the same file (data/bootstrap_corpus_v6_live2_ls.npz) for
  # encoding v6_live2_ls, now with a launch sha-pin enforced at load time
  # (docs/registers/run3_corpus_manifest.md).
  pretrained_buffer_path: "<auto>"
  initial_pretrained_weight: 0.8
  min_pretrained_weight: 0.1
  decay_steps: 200000

eval_interval: 25000         # ruling: promotion gate cadence 25k
eval_pipeline:
  opponents:
    # Monitoring arms (unchanged from run2 — SealBot true-north, best-arena,
    # off-window Objective-A guard). Stride 2 = every 50k for cost.
    best_checkpoint: { enabled: true,  stride: 2, n_games: 200, model_sims: 64, opponent_sims: 64 }
    sealbot:         { enabled: true,  stride: 2, n_games: 50 }
    random:          { enabled: true,  stride: 2, n_games: 20  }
    bootstrap_anchor: { enabled: true, stride: 4, n_games: 50, model_sims: 64, opponent_sims: 64, path: checkpoints/bootstrap_model_v6_live2_8300.pt, encoding: v6_live2 }
    nnue:            { enabled: false }
    offwindow_adversary: { enabled: true, stride: 2, n_games: 100, arm: "exploit", model_sims: 128 }

    # ── PROMOTION gate (D3+D4): the 25k / 64-pair / CI>0.5 subprocess gate ─────
    # run2 ran deploy_strength at stride 4 (every 100k, confirm_n 100) — the
    # expensive in-loop Gumbel-150 strength eval the ruling DISABLES. run3 runs
    # it at stride 1 (every 25k) over a 64-opening paired book, subprocess-
    # isolated (promotion_gate_subprocess_isolation above), promoting on the
    # distinct-game bootstrap CI-lower > 0.5 (require_ci_above_half below).
    # sealbot_games 0: NO in-loop SealBot bar (D4 — strength via mantis_pull_eval
    # OFFLINE at milestones). ⚠ confirm confirm_n/book vs the "64-pair" reading.
    deploy_strength:
      enabled: true
      stride: 1               # every 25k (was run2 stride 4 = 100k)
      screen_n: 80
      confirm_n: 128          # ⚠ 64 opening-pairs × 2 sides (CONFIRM vs the book)
      sealbot_games: 0        # D4: no in-loop strength bar; mantis_pull_eval offline
      # book: <64-pair fair-opening book, minted fresh per stage — §10>  ⚠ set at launch
  gating:
    promotion_winrate: 0.55
    require_ci_above_half: true   # CI-lower > 0.5 (the ruling's "CI>0.5")
    bootstrap_floor:
      enabled: false

telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

monitors:
  hard_abort_grad_norm: 10.0
  hard_abort_draw_rate: 0.55
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0

selfplay_stall_timeout_sec: 1800.0   # run2 eval-wedge watchdog (explicit)

# ── §10 LAUNCH CHECKLIST (operator, at launch — same discipline as run2 §10) ──
#  1. Mint the re-stamped weights-only v6_live2_ls bootstrap (--checkpoint target).
#  2. Preflight the dist65 head loads (weights-only warm-start OR fresh init —
#     confirm which run3 uses; ruling says "fresh init v6_live2_ls").
#  3. Mint FRESH seeded fair-opening books per radius stage (ruling: "fresh
#     seeded books per stage") + wire the 64-pair promotion book (⚠ decision).
#  4. bench-gate + registry audit + HOST-MATCH baseline mint.
#  5. Confirm the ⚠ promotion-gate decision above with the operator.
