# configs/variants/v6_live2_smoke.yaml
#
# §P5-CT — v6_live2 H-PLANE-MISMATCH fix smoke.
#
# v6_live2 = v6tp MINUS the dead history planes (1-3/9-11): keeps only the
# planes that are live on BOTH the pretrain and self-play paths — my/opp stones
# at t0 (0/8) + turn-phase scalars (16/17) = 4 planes. This removes the 6-plane
# pretrain↔selfplay distribution shift documented in
# reports/investigations/hplane_mismatch_20260529.md (H-PLANE-MISMATCH CONFIRMED).
#
# GATE (MCTS-matched vs the v6tp 30k archive, both T=0 and T=0.5):
#   - v6_live2 >= v6tp within Wilson CI + V_spread net-positive + spam-signal
#     clean  → ADOPT v6_live2 as the clean encoding (parsimony; no cliff).
#   - v6_live2 clearly < v6tp / below anchor 0.174 / V_spread collapse / spam
#     fires → KEEP v6tp; the pretrain head benefits from history despite
#     self-play zeroing it. Close H-PLANE as "known asymmetry, net-neutral".
#
# Single variable vs v6tp: the encoding (4-plane [0,8,16,17] vs 10-plane). Same
# engine HEAD (CF-1+CF-4), same human games + seed 42, same lever stack OFF,
# same eval, 30k steps. Run eval at BOTH temperatures (§P5-CT L21/L22/L62).
#
# Bootstrap + corpus (produced by scripts/p5a_v6_live2_pretrain.sh):
#   - checkpoints/bootstrap_model_v6_live2.pt   (4-plane, fresh 30-ep)
#   - data/bootstrap_corpus_v6_live2.npz        (4-plane, same games as v6tp)
#
# Launch:
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v6_live2.pt \
#     --variant v6_live2_smoke --iterations 30000

# ── encoding (v6tp minus the dead history planes) ────────────────────────────
encoding: v6_live2
in_channels: 4

total_steps: 30000
eval_interval: 5000

# ── Phase 6 flatness fixes — single re-measure vs the prior v6_live2 30k ──
# CF-5: zero the mis-fed opp-reply aux head. compute_aux_loss trains on the
# current-player MCTS visit target (the SAME target as compute_policy_loss),
# not the opponent's reply — a redundant gradient spending 15% of loss weight
# reinforcing the (flat) policy distribution. Off until a real next-turn target
# is plumbed. See reports/investigations/phase6_scoping_memo_20260531.md §3.
aux_opp_reply_weight: 0.0

selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0

mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"

eval_pipeline:
  opponents:
    bootstrap_anchor:
      path: "checkpoints/bootstrap_model_v6_live2.pt"   # self-anchor (4-plane)
      encoding: v6_live2   # §D-EVALGATE: anchor's OWN encoding — assertion vs its stamp (unstamped anchor otherwise hard-fails when enabled); declare path+encoding in the SAME block
    sealbot:
      enabled: true
    randombot:
      enabled: true
    best_checkpoint:
      enabled: true
    # §P6 — Hammerhead NNUE 2nd ladder opponent ACTIVE in-run (operator
    # request). EVAL-ONLY: never touches self-play/training, so the 30k stays
    # single-variable vs the prior v6_live2 30k — it only adds an in-run NNUE
    # WR trajectory alongside SealBot (general-strength vs SealBot-specific read).
    # REQUIRES hammerhead built on the run host (vast): `maturin develop
    # --release` in vendor/bots/hammerhead/hammerhead-engine + pip install the
    # SDK, else evaluate_vs_nnue raises when this fires. n_games=50 bounds the
    # added per-round eval time (~half SealBot's 100); time_per_stone_ms=500
    # matches the standalone post-run eval. The precise n=100 read is taken
    # standalone on the final checkpoint (STEP 3).
    nnue:
      enabled: true
      stride: 1
      n_games: 50
      time_per_stone_ms: 500
      model_sims: 128

telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

monitors:
  hard_abort_grad_norm: 10.0
