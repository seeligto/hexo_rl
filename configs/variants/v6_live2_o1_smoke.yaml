# configs/variants/v6_live2_o1_smoke.yaml
#
# §O1 VALIDATION SMOKE — forced-win → one-hot POLICY target ON.
#
# IDENTICAL to configs/variants/v6_live2_smoke.yaml (the post-fix v6_live2 30k
# baseline: vast run f8aaf414, ~32% greedy / ~0.18 sampled SealBot, 1.8x gap)
# EXCEPT the single variable: forced_win_policy_enabled: true. This is the O1
# validation smoke pre-registered in reports/investigations/diagnostics_o1_20260602.md
# and reports/investigations/prelaunch_cleanup_o1_smoke_2026-06-02.md.
#
# Runs on the CLEAN post-cleanup tree (Stage 0-2: PIPE-1, MAGIC-2, SCATTER-1,
# B2/B3/B4/C1/C2/PIPE-4, B1a/B1c all landed). O1 default-OFF byte-equivalence is
# preserved everywhere; this variant is the ONLY place O1 flips on.
#
# PRE-REGISTERED VERDICT (TWO hard gates, BOTH must pass) — eval at T=0 AND
# T=0.5 vs SealBot AND NNUE (n=100 standalone on the final checkpoint):
#   GATE 1 SHARPENING: greedy/sampled gap narrows 1.8x → ~1.3x (O1's purpose).
#   GATE 2 PERF: worker_pos/hr holds — the O1-ON depth-2 detector is O(legal^2)/move
#     and was UNMEASURED at implementation; this is the first O1-ON throughput
#     number. Material worker_pos drop ⇒ depth-1-only or detector optimization
#     before any long run.
#   PASS (both) → O1 validated → green-light prolonged-run sign-off (arch session).
#   SHARPENING-FAIL → O1 insufficient → knob-retune ladder (arch session).
#   PERF-FAIL → O1 works but too costly → fall back to depth-1-only, re-smoke.
#   REGRESSION (spam fires / strength < baseline / win-detect anomaly) → halt, bisect.
# Also watch: early-game entropy (expect it to sharpen below ~3.1 nats), entropy
# on O1-hardened rows (weight=1.0 fully replaces the target — confirm not
# over-sharpening globally), value_spread excursion (§S181 signature dipped
# negative s15-22k last run + self-corrected — watch it doesn't propagate),
# colony / stride5 spam.
#
# Launch (vast 5080; hammerhead built on host for in-run NNUE):
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v6_live2.pt \
#     --variant v6_live2_o1_smoke --iterations 30000

# ── encoding (v6tp minus the dead history planes) ────────────────────────────
encoding: v6_live2
in_channels: 4

total_steps: 30000
eval_interval: 5000

# ── Phase 6 flatness fixes (matched to the baseline) ─────────────────────────
aux_opp_reply_weight: 0.0

selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0
  # ── O1 — the single variable vs the post-fix v6_live2 baseline ──
  # Hardens the training policy target to a (near-)one-hot on a proven
  # within-turn forced win the soft visit distribution under-weights. Fires once
  # per move at target extraction (NOT in the per-sim hot path); the hardened
  # row is forced full-search so PCR's full_search_mask can't drop the target.
  forced_win_policy_enabled: true
  forced_win_policy_depth: 2     # depth-1 (immediate win) + depth-2 (within-turn setup)
  forced_win_policy_weight: 1.0  # pure one-hot on the proven winning move

mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"

eval_pipeline:
  opponents:
    bootstrap_anchor:
      path: "checkpoints/bootstrap_model_v6_live2.pt"   # self-anchor (4-plane)
      encoding: v6_live2   # §D-EVALGATE: anchor's OWN encoding — assertion vs its stamp (unstamped anchor otherwise hard-fails when enabled); declare path+encoding in the SAME block
    sealbot:
      enabled: true
    randombot:
      enabled: true
    best_checkpoint:
      enabled: true
    # §P6 — Hammerhead NNUE 2nd ladder opponent ACTIVE in-run (eval-only;
    # general-strength vs SealBot-specific read). REQUIRES hammerhead built on
    # the run host (vast). n_games=50 bounds added per-round time.
    nnue:
      enabled: true
      stride: 1
      n_games: 50
      time_per_stone_ms: 500
      model_sims: 128

telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

monitors:
  hard_abort_grad_norm: 10.0
