# v9_s3_per_move_no_hex_5080 — Phase B' v9 §153 T5 smoke S3.
#
# v7full bootstrap (no hex trunk, no corner-mask) + R = 5 fixed +
# per-move rotation. Isolates the per-move rotation knob's contribution
# to Class-4 against the §152 baseline (no Q2 jitter, no hex trunk).
#
# Bootstrap: checkpoints/bootstrap_model_v7full.pt — the canonical §150
# 30-epoch bootstrap (Conv2d trunk, no corner_mask). Tests per-move
# rotation in isolation, on the same trunk that v7 / v7e30 / v8 used.
#
# Launch:
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v7full.pt \
#     --variant v9_s3_per_move_no_hex_5080 \
#     --checkpoint-dir checkpoints/v9_s3_per_move \
#     --no-dashboard \
#     --iterations 2500

training_steps_per_game: 4.0
max_train_burst: 8
eval_interval: 500

model:
  use_hex_kernel: false
  corner_mask: false

selfplay:
  gumbel_mcts: false
  completed_q_values: true
  max_game_moves: 150
  n_workers: 8
  inference_batch_size: 32
  inference_max_wait_ms: 2.0
  leaf_batch_size: 4
  playout_cap:
    fast_prob: 0.0
  legal_move_radius_jitter: false
  rotation_cadence: per_move

monitors:
  hard_abort_grad_norm: 10.0

instrumentation:
  enabled: true
  value_probe_interval: 250
  composition_interval: 500
  value_probe_fixture: fixtures/value_probe_50.npz
