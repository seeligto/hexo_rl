# configs/variants/p3_armc_gumbel.yaml
#
# §D-GUMBELSIMS Phase 3 LEAN — Arm-Gumbel (TREATMENT). Gumbel-Top-k + Sequential
# Halving self-play search at the Phase-1 cheap operating point (m=32, n=100),
# paper-default c_visit/c_scale (50/1.0; NO Step-1 tuning per the LEAN scope).
# Matched pair with p3_armc_puct.yaml — byte-identical EXCEPT the search regime.
#
# Operating point rationale: Phase-1 proxy found NO clean knee on v6_live2_ls
# (knee_n=None across m=8/16/32, OFF+ON; reports/gumbelsims/PHASE1_RESULT.md), but
# the value-regret SH-warmup elbow + best-at-fixed-budget sits at (m≈32, n≈100).
# This arm tests whether Gumbel-100 makes self-play targets strong enough to be
# NON-INFERIOR to PUCT-600 — the proxy cannot answer that (it compared Gumbel-n to
# Gumbel-400, not to PUCT). POSITIVE = non-inferior strength + a real pos/hr
# multiplier (6× cheaper full-search) + coherence not degraded.
#
# LAUNCH (vast, operator-run):
#   rm -f checkpoints/best_model.pt{,.bak}   # W2: fresh-init the pinned anchor
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v6_live2.pt \
#     --variant p3_armc_gumbel --iterations 15000

# ── encoding (4-plane v6_live2_ls multi-window legal-set) ─────────────────────
encoding: v6_live2_ls
in_channels: 4

# ── LR — re-warm cosine (identical to Arm-PUCT) ───────────────────────────────
lr: 2e-3
eta_min: 5e-4
aux_opp_reply_weight: 0.0

# ── selfplay — Gumbel-SH; the ONE A/B variable is the search regime ───────────
selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0
  gumbel_mcts: true                # <-- TREATMENT: Gumbel-Top-k + Sequential Halving
  gumbel_m: 32                     # root candidates (Phase-1 best-at-fixed-budget)
  gumbel_explore_moves: 10         # first N plies use visit-count sampling (default)
  c_visit: 50.0                    # paper default (NO Step-1 tuning — LEAN scope)
  c_scale: 1.0
  playout_cap:
    full_search_prob: 0.5          # production cap (held constant vs Arm-PUCT)
    n_sims_full: 100               # Gumbel cheap full-search budget (vs PUCT 600)
    n_sims_quick: 100              # quick-search budget (held constant)

# ── mixing — REUSE the v6_live2 corpus (== Arm-PUCT) ──────────────────────────
mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"

# ── eval — TRIMMED (identical to Arm-PUCT): opponents OFF, laptop does strength ─
eval_interval: 2500
eval_pipeline:
  opponents:
    best_checkpoint: { enabled: false }
    sealbot:         { enabled: false }
    random:          { enabled: true, stride: 1, n_games: 20 }
    bootstrap_anchor: { enabled: false }
    nnue:            { enabled: false }
    offwindow_adversary: { enabled: false }
  gating:
    expected_anchor_sha256: "4198d5cbd2fc0ce77ad2e3d86e32311ee40c53c926f135c52ea3749816b0a186"

telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

monitors:
  hard_abort_grad_norm: 10.0
  hard_abort_draw_rate: 0.55
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0
