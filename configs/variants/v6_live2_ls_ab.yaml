# configs/variants/v6_live2_ls_ab.yaml
#
# §D-MULTICLUSTER-S0 — Arm C (TREATMENT) of the 3-arm A/B. A byte-for-byte clone
# of v6_live2_golong.yaml with the ONLY change being the encoding (single-window
# v6_live2 → multi-window legal-set v6_live2_ls) + the corpus path. Per the
# AB_RUNBOOK: change-only-the-encoding. The v6_live2 4-plane/362 bootstrap loads
# into v6_live2_ls with NO reshape (head shape preserved).
#
# A/B-honesty: v6_live2_ls flips is_multi_window=true (forces value_pool=min) +
# k_max 1→8 + the legal-set action policy — ONE multi-window mechanism, NOT an
# isolated action-space change. Strength is a non-inferiority safety guard (P1);
# GREENLIGHT rests on Objective-A robustness (C beats the Arm-B overlay).
#
# CORPUS: dense-362 per-cluster-local rows are representation-compatible with
# v6_live2 (design §9.8), but the multi-window corpus generation differs (K
# cluster rows/ply). The path below is DISTINCT; regenerate via
# `export_corpus_npz.py --encoding v6_live2_ls` OR confirm reuse with run-design
# BEFORE the 50k (the resolver corpus path is also data/bootstrap_corpus_v6_live2_ls.npz).
#
# LAUNCH (operator-run on vast; S1-FULL kill gate MUST pass first):
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v6_live2.pt \
#     --variant v6_live2_ls_ab \
#     --iterations 50000
#   (fresh 50k from the SAME bootstrap as Arm A; preflight = the golong launch
#    script's stale-replay_buffer.bin cleanup. Eval MUST route by NAME through
#    KClusterMCTSBot, never the shape resolver — §9.10.)

# ── encoding (4-plane [0,8,16,17]; multi-window legal-set, no off-window drop) ──
encoding: v6_live2_ls
in_channels: 4

# ── LR — re-warm cosine (identical to Arm A golong) ───────────────────────────
lr: 2e-3
eta_min: 5e-4

# ── CF-5 (smoke-continuity): zero the mis-fed opp-reply aux head ──────────────
aux_opp_reply_weight: 0.0

# ── selfplay — IDENTICAL to Arm A ─────────────────────────────────────────────
selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0

# ── mixing — REUSE the v6_live2 corpus (A/B-clean: Arm C holds the corpus
#    constant with Arm A and changes ONLY the encoding; §9.8 dense rows are
#    wire-compatible; the S1-FULL smoke validated this corpus on v6_live2_ls). ──
mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"

# ── eval — IDENTICAL cadence to Arm A golong. NB the off-window/exploitability
#    reads here are WATCH-ONLY; the decisive A/B is standalone exploit_probe.py
#    + the precheck counterfactual, routed through KClusterMCTSBot (§9.10/P4). ──
eval_interval: 12500
eval_pipeline:
  opponents:
    best_checkpoint:
      # §D-LOOPFIX POWER (A-POWER). The n=50 override is replaced by an EXPLICIT
      # n=400 (NOT just dropping it — eval.yaml's base is n=100, bar 0.600,
      # P(promote|0.55)=0.183, dead band intact). Operating characteristics with
      # the CI guard (require_ci_above_half) at n=400, bar = 220/400 (0.550):
      #   P(promote | true 0.55)       = 0.521   (≥ 0.5 target — A-POWER PASS)
      #   P(false-promote | true 0.50) = 0.0255  (≤ 0.05 target — A-POWER PASS)
      # The dead band is GONE: at n=400 the CI-guard bar == the nominal 0.55 bar.
      # vs the killed n=50 point: bar 32/50 (0.640), P(0.55)=0.127, dead band 0.55-0.62.
      # vs base n=100: bar 60/100 (0.600), P(0.55)=0.183 — still the golong-era bar.
      # OCs from the shipped evaluate_gate × binomial (§D-LOOPFIX Phase 4; reproduce
      # over hexo_rl.eval.gate_logic.evaluate_gate).
      # §D-LOOPFIX W1 CADENCE: stride 2→1 so EVERY 12500-step interval is
      # promotion-capable (4 capable rounds in 50k; was stride 2 → only rounds 2,4).
      enabled: true
      stride: 1
      n_games: 400
      opponent_sims: 64
    sealbot:
      enabled: true
      stride: 1
      n_games: 100
    random:
      enabled: true
      stride: 1
      n_games: 20
    bootstrap_anchor:
      # §D-LOOPFIX W1: stride 2→1 so the §155 T2 bootstrap-floor measurement is
      # present on EVERY promotion-capable round (else the floor's missing-
      # measurement default BLOCKS odd rounds, undoing best stride 1). model/
      # opponent sims 1→128: the sims=1 argmax floor degenerated into the
      # §D-PROMOGATE 11,032 s colony cell (551 s/game, ~360-ply); a decisive
      # full-strength floor is both faster per round AND a stronger guard.
      enabled: true
      stride: 1
      n_games: 20
      model_sims: 128
      opponent_sims: 128
      path: "checkpoints/bootstrap_model_v6_live2.pt"
    nnue:
      # §D-LOOPFIX W1: stride 4→2 — the §P6 strength-ladder read lands IN-RUN at
      # rounds 2,4 (was stride 4 → a single terminal-only read).
      enabled: true
      stride: 2
      n_games: 50
      time_per_stone_ms: 500
      model_sims: 128
    offwindow_adversary:
      # §D-LOOPFIX W1: stride 4→2 — the PRIMARY-greenlight Objective-A robustness
      # read lands IN-RUN at rounds 2,4 (WATCH-only here; the decisive read is the
      # standalone exploit_probe.py + counterfactual via KClusterMCTSBot, §9.10/P4).
      enabled: true
      stride: 2
      n_games: 100
      arm: "exploit"
      model_sims: 128
  gating:
    # §D-LOOPFIX W2 — pin the intended incumbent (bootstrap_model_v6_live2). The
    # launch preflight (resolve_anchor) HARD-FAILS if best_model.pt resolves to
    # anything else — closing the silent restore-from-.bak that installed
    # golong@50k-PEAK as the as-run Arm-C incumbent + self-play generator.
    # Preflight: rm -f checkpoints/best_model.pt{,.bak} so resolve_anchor
    # fresh-inits the pinned bootstrap. Reproduce the sha:
    #   python scripts/anchor_sha256.py checkpoints/bootstrap_model_v6_live2.pt
    expected_anchor_sha256: "4198d5cbd2fc0ce77ad2e3d86e32311ee40c53c926f135c52ea3749816b0a186"

# ── telemetry ─────────────────────────────────────────────────────────────────
telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

# ── monitors — the 3 LIVE hard-abort gates + draw-rate (identical to Arm A) ────
monitors:
  hard_abort_grad_norm: 10.0
  hard_abort_draw_rate: 0.55
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0
