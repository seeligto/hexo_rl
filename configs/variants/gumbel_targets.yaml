# gumbel_targets — PUCT search + completed Q-value targets (no Gumbel root)
# Laptop variant. P3 sweep winner knobs are in base selfplay.yaml + training.yaml;
# this variant only enables completed_q_values on top.
# Knob provenance: sprint log §69.
# Launch: make train VARIANT=gumbel_targets
#
# Experiment C (§95) REVERTED: zero_chain_planes ablation showed chain planes
# are essential — draw rate was +35pp worse vs smoke_v3b. zero_chain_planes flag
# remains available in training.yaml (default false) for future tests.
selfplay:
  gumbel_mcts: false
  completed_q_values: true
  # max_game_moves counts PLIES (individual stone placements), not compound
  # moves. 200 plies ≈ 100 compound turns. Set to match gumbel_full and
  # baseline_puct. 150 was a §69 sweep artifact for fast_prob=0.25 which
  # no longer applies (fast_prob=0.0 since §75).
  max_game_moves: 200
  playout_cap:
    # fast_prob=0.0: PUCT at 50 sims + τ=1.0 on infinite board produces
    # colony-extension draws (94.4% draw rate, §75 investigation).
    # Fast games provide no useful signal on this variant.
    # See reports/draw_rate_investigation_2026-04-10/report.md
    fast_prob: 0.0
