# w4c_smoke_v7_5080 — Phase B' v10 §156 sustained-run candidate.
#
# Master config + the v10 supply lands:
#   - Q2 LEGAL_MOVE_RADIUS jitter ∈ {4, 5, 6}              (§152 verdict, v8 plumbing)
#   - bootstrap-floor multi-anchor promotion gate          (§155 T2)
#   - cosine-temp disable (fixed τ=0.5 across the game)    (§156 R12 verdict)
#
# ## §156 knob-fix verdict — cosine temperature schedule is load-bearing
#
# §156 R10 within-bisection (n=200 each, 5080):
#
#   Variant   Knob removed                 draw_rate (95% CI)        verdict
#   R10       (none — full smoke regime)   91.0% [86.2%, 94.2%]      BASELINE
#   R11       Dirichlet ε=0.10 → 0          88.0% [82.8%, 91.8%]     NULL
#   R12       cosine temp → fixed τ=0.5     5.0% [2.7%, 9.0%]        LOAD-BEARING
#   R13       opening_plies=1 → 4           85.0% [79.4%, 89.3%]     NULL
#   R14       playout cap → uniform 600     99.0% [96.4%, 99.7%]     INVERSE
#
# R12 is the only variant whose Wilson upper bound clears the 50% gate.
# Removing the cosine schedule (τ=1.0 → 0.05 over compound_move [0,10),
# smoke v6 master setting) collapses draws from 91% to 5%, drops mean ply
# from 140 to 63, and crushes stride5 P90 from 97 to 4.  R14's inverse
# amplification (deeper search → MORE draws) confirms the playout cap was
# partially mitigating the lock; uniform 600 sims with cosine still on
# pushes the regime to 99%.  Full bisection report:
# `reports/phase_b_prime/training_knob_isolation/r10_bisection.md`.
#
# Caveat: R12 produced 134/200 = 67% colony wins — the §147 v5 / §154 v9
# colony-attractor signature.  τ=0.5 fixed alone breaks the draw lock but
# lights up the colony failure mode.  Mitigated here by:
#   1. legal_move_radius_jitter: true (Q2 §152 verdict, only confirmed
#      Class-4 lever; reduces stride5 P90 by ~9% on bootstrap measurement)
#   2. bootstrap_floor.min_winrate: 0.45 (catches colony regressions even
#      if R12's 67% colony rate carries into the trainer)
#
# ## Bootstrap-floor gate (active in this variant)
#
# Guards against the v9 Class-5 colony-attractor failure mode where the
# trainer reaches wr_best ≈ 0.86–0.91 vs the rotating best_checkpoint anchor
# while losing 199/200 vs SealBot.  The frozen v7full bootstrap is the
# floor opponent; promotion AND-requires wr_bootstrap_anchor ≥ 0.45 in
# addition to the existing wr_best ≥ 0.55 + ci_lo > 0.5 gates.
#
# ## Q2 jitter (active in this variant)
#
# §152 / §154 verdict: legal_move_radius jitter ∈ {4, 5, 6} per game is the
# only confirmed lever on the Class-4 stride-5 fixed point.
#
# ## 1k-step laptop pre-flight gate (BEFORE 5080 launch)
#
# Run this variant for 1k steps on the laptop and verify:
#   - stride5_run P90 < 30 over the run window
#   - draw_rate < 50%
#   - no promotion fires under bootstrap-floor without anchor WR ≥ 0.45
# If all three hold, surface to user for 5080 sustained authorisation.
#
# Launch (laptop pre-flight, 1k steps):
#   .venv/bin/python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model.pt \
#     --variant w4c_smoke_v7_5080 \
#     --checkpoint-dir checkpoints/w4c_smoke_v7_preflight \
#     --no-dashboard \
#     --iterations 1000

training_steps_per_game: 4.0
max_train_burst: 8

eval_interval: 500   # tighter cadence so the bootstrap-floor opponent
                     # measures every promotion-eligible round

selfplay:
  gumbel_mcts: false
  completed_q_values: true
  max_game_moves: 150
  n_workers: 18                 # §138 5080 sweep verdict
  inference_batch_size: 224     # §138 5080 sweep verdict
  inference_max_wait_ms: 8.0    # §138 5080 sweep verdict
  leaf_batch_size: 4
  playout_cap:
    fast_prob: 0.0
    # §156 R12 fix — disable the cosine temperature schedule that drove
    # the R10 91% draw lock.  threshold=0 collapses the schedule so τ
    # always equals temp_min; temp_min=0.5 is the T2 baseline value.
    temperature_threshold_compound_moves: 0
    temp_min: 0.5
  # §152 Q2 — per-game LEGAL_MOVE_RADIUS jitter ∈ {4, 5, 6}.  Sole confirmed
  # lever on the Class-4 stride-5 fixed point.
  legal_move_radius_jitter: true

# §155 T2 — bootstrap-floor multi-anchor promotion gate.  Frozen v7full as
# the reference opponent; promotion blocks when the trainer collapses
# below 45% WR vs the bootstrap (the v9 Class-5 colony-attractor signature).
eval_pipeline:
  opponents:
    bootstrap_anchor:
      enabled: true
      stride: 1                              # match best_checkpoint cadence
      n_games: 100
      model_sims: 128
      opponent_sims: 128
      # Pin to v7full explicitly (not the rotating canonical) so promotion
      # rotations on `bootstrap_model.pt` do not silently shift the floor.
      path: checkpoints/bootstrap_model_v7full.pt
  gating:
    bootstrap_floor:
      enabled: true
      min_winrate: 0.45

# ## §156 knob fix — applied above
#
# `selfplay.playout_cap.temperature_threshold_compound_moves: 0` +
# `selfplay.playout_cap.temp_min: 0.5` together disable the cosine
# schedule (the R12 fix).  See the verdict block at the top of this file
# and the bisection report for full data.
#
# Conservative interim fallback (if the trainer regression is severe):
# combine the τ=0.5 fix with `mcts.dirichlet_epsilon: 0.025` and
# `selfplay.random_opening_plies: 4` to disable the other two
# exploration knobs as well.  Loses self-play exploration entirely;
# use only if the cosine-disable alone fails Gate 4.

monitors:
  hard_abort_grad_norm: 10.0

instrumentation:
  enabled: true
  value_probe_interval: 250
  composition_interval: 500
