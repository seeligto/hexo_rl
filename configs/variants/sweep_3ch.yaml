# §122 sweep — 3-channel variant (minimal + 1 my-history).
#
# Channel set: {0, 1, 8} — current stones + my-1-step history + opp stones.
# Probes whether asymmetric history is enough.

input_channels: [0, 1, 8]

seed: 12200
run_name: sweep_3ch

total_steps: 10000
eta_min: 2e-4
checkpoint_interval: 500
eval_interval: 500
max_checkpoints_kept: 1000
preserve_eval_checkpoints: true

mixing:
  pretrained_buffer_path: data/bootstrap_corpus_sweep_3ch.npz
  decay_steps: 2000
  initial_pretrained_weight: 0.8
  min_pretrained_weight: 0.1
  buffer_persist: false

augment: true
