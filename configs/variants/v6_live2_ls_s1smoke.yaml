# configs/variants/v6_live2_ls_s1smoke.yaml
#
# §D-MULTICLUSTER-S0 Phase 3 — S1-FULL kill gate. The FAITHFUL training smoke the
# eval-only precheck couldn't run (the SGD policy target is born in Rust via the
# legal-set records path, the loss consumes the per-cluster-local-362 rows). Tests
# the bootstrap→selfplay→train handoff on the REAL v6_live2_ls encoding — the
# thing §174 failed 3× (v6w25 30-ep / e50 / transfer-FT).
#
# PRE-REGISTERED §174 KILL (PREREGISTRATION.md): DEGENERATE (KILL — do NOT build
# the 50k) iff self-play viability median ply ≤9 OR ≤0.5×iter-0 median OR root
# visit-argmax collapses to a fixed off-cluster cell OR SealBot MCTS-WR → 0 while
# iter-0 WR > 0. NON-DEGENERATE (PASS) iff median ply stays ≥14 AND argmax is
# threat-relevant AND WR stays > 0. (Healthy self-play median ply 17+; FAIL 6-9.)
#
# A clone of v6_live2_ls_ab.yaml with SMOKE tweaks: (1) reuse the EXISTING
# v6_live2 corpus (same wire-signature 4/362/size_19 → load.rs accepts it; the
# multi-window corpus regeneration is deferred to the real 50k); (2) frequent +
# trimmed eval (SealBot + random only) so the SealBot-WR kill signal lands within
# the short run; (3) telemetry on for the self-play median-ply kill signal.
#
# LAUNCH (vast, AFTER preflight rm of stale checkpoints/replay_buffer.bin):
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v6_live2.pt \
#     --variant v6_live2_ls_s1smoke \
#     --iterations 4000

encoding: v6_live2_ls
in_channels: 4
lr: 2e-3
eta_min: 5e-4
aux_opp_reply_weight: 0.0

selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0

# SMOKE: reuse the existing v6_live2 corpus (same wire-signature; regen deferred).
mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"

# SMOKE: frequent eval so the SealBot-WR kill signal lands inside 4k steps; trim
# to SealBot (the WR kill metric) + random (cheap sanity). The slow opponents
# (best_checkpoint / nnue / bootstrap_anchor / offwindow) are off for the smoke.
eval_interval: 1000
eval_pipeline:
  opponents:
    sealbot:
      enabled: true
      stride: 1
      n_games: 50
    random:
      enabled: true
      stride: 1
      n_games: 20
    best_checkpoint:
      enabled: false
    bootstrap_anchor:
      enabled: false
    nnue:
      enabled: false
    offwindow_adversary:
      enabled: false

telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

monitors:
  hard_abort_grad_norm: 10.0
  hard_abort_draw_rate: 0.55
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0
