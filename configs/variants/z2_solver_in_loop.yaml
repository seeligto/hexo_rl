# Full runbook + the discriminator + co-gates: docs/handoffs/d_ws3_l1_smoke_runbook.md
# (superseded, see its own banner) — LIVE runbook: docs/handoffs/d_ws3v3_smoke_runbook.md
#
# HARD INVARIANT (graft A): self-play decode MUST match deploy decode. v6_live2_ls
# is policy_pool=legal_set_scatter_max → self-play runs the multi-window no-drop
# legal_set path AND the deploy head decodes legal_set=True (needs_no_drop_bot) —
# both reach the same Rust aggregate_policy_ls kernel, so off-window saving moves
# are expressible in BOTH (else the ratchet silently dies).
#
# RETRACTED (D-WS3V3 FIX1/FIX4, found 2026-07-02): "Confirmed, no mismatch" above
# was FALSE AT RUNTIME. `reports/d_decide_2026-06-24/checkpoints/checkpoint_00200000.pt`
# carries STALE `metadata['encoding_name']='v6_live2'` (single-window, NOT
# v6_live2_ls). `trainer_ckpt_load.py` prefers checkpoint metadata unconditionally
# and `orchestrator.py` back-propagates the ckpt-resolved encoding into the
# variant's combined config, which `pool.py` resolves for the Rust self-play
# runner — so the `--resume checkpoint_00200000.pt` launch below (and v2's actual
# run) self-played SINGLE-WINDOW v6_live2 the whole time, regardless of this
# file's `encoding: v6_live2_ls` declaration. The single-window Dense self-play
# path DROPS off-window wins outright, so the off-window injection routing this
# invariant describes was DEAD in v2 — not confirmed, not even exercised. The
# fix (checkpoint re-stamping with a wire-signature-validated encoding override,
# `scripts/make_ws3v3_warmstart.py`) lives in the v3 rebuild
# (`configs/variants/ws3v3_arm_*.yaml`, `docs/handoffs/d_ws3v3_smoke_runbook.md`).
# See `docs/07_PHASE4_SPRINT_LOG.md` §D-WS3 for the full retro-correction,
# including an OPEN FORENSIC QUESTION on how far back this cascades (do NOT
# investigate further here — flagged, not resolved).
encoding: v6_live2_ls
in_channels: 4
lr: 2e-3
eta_min: 5e-4
aux_opp_reply_weight: 0.0
training_steps_per_game: 1.0

selfplay:
  completed_q_values: true
  n_workers: 24               # =nproc on the 5080 host; 32 oversubscribed (load ~29) under the per-move solver CPU cost
  inference_batch_size: 64
  inference_max_wait_ms: 2.0
  leaf_batch_size: 8
  random_opening_plies: 0
  gumbel_mcts: true
  gumbel_m: 16
  gumbel_explore_moves: 10
  c_visit: 50.0
  c_scale: 1.0
  playout_cap:
    full_search_prob: 1.0
    n_sims_full: 150
    n_sims_quick: 150

  # ── THE ONE NEW LEVER — native solver-in-loop SOFT visit-injection (L1) ──────
  # Per self-play move the net-free engine::tactics solver proves the side-to-
  # move's forced win and SOFT-blends visit mass onto the proving move (line[0])
  # into the POLICY training target. WIN proofs are sound by construction (no R3
  # LOSS-guard dependency — this smoke writes NO LOSS-derived z; that is the HELD
  # L2 value-z path). window_half=None surfaces off-window wins → routed through
  # the legal_set coverage gate into the ragged target (D-DECODE action-space fix).
  solver_enabled: true
  solver_depth: 16            # PLIES (~2x mate-distance-in-turns; corpus band mate-in-2..9 turns)
  solver_node_budget: 20000   # per-prove node cap. MEASURED 2026-07-01 (release solver, 31 trap parents):
                              # no-win moves exhaust to the budget at BOTH depth 10 and 16 → budget (NOT depth)
                              # is the throughput cost lever; ≤8-ply wins (corpus proven_depth≤8, all 31+125)
                              # are proven in the narrow must-block tree well under 20k → recall-safe, ~2.5x faster.
  solver_neighbor_dist: 2     # quiet-move widening for recall on the ~80%-quiet trap class (A2); <0 = threat-only
  solver_visit_weight: 0.15   # SOFT injection (convex blend). 0.3 RAN 2026-07-02 → KILL (normal-play
                              # deploy-disagree 47%, threat-probe C2 FAIL, trap-flip DROPPED, value-spread
                              # +0.617→+0.140). AT THE TIME this read as "0.3 too aggressive, soften to
                              # 0.15" — but a solver-OFF control run under the SAME confounded regime
                              # (full-ckpt resume LR drift + cold buffer) reproduced the SAME KILL
                              # signature (deploy-disagree 49%, trap-flip 12.9%→6.5%) WITHOUT the
                              # solver at all. FALSIFIED: the 0.3→0.15 softening rationale attributed
                              # regime damage to the injection. Weight itself is not re-validated as
                              # corrupting — ws3v3_arm_inject.yaml re-runs at 0.5 under the fixed
                              # regime instead of continuing to soften a lever that was never shown
                              # guilty. See docs/handoffs/d_ws3v3_smoke_runbook.md §0.
  # O1 forced-win one-hot stays OFF (the solver supersedes it; single-variable).
  forced_win_policy_enabled: false

mcts:
  dirichlet_enabled: false    # Gumbel-Top-k IS root exploration; no double root-noise (anchor pin)

mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"
  initial_pretrained_weight: 0.8
  min_pretrained_weight: 0.1
  decay_steps: 200000

# Shorter eval cadence for the ~1-GPU-day smoke (the anchor's 30000 would not fire
# inside an 8k run). The smoke's HEADLINE gate is the OFFLINE held-out trap-flip
# evaluator (scripts/eval/run_l1_trapflip_smoke.py), NOT the in-loop promotion eval
# — keep the in-loop eval light so it does not eat the GPU-day.
eval_interval: 4000
eval_pipeline:
  opponents:
    sealbot:         { enabled: true,  stride: 1, n_games: 100 }
    best_checkpoint: { enabled: false }
    random:          { enabled: false }
    nnue:            { enabled: false }
    offwindow_adversary: { enabled: false }
  gating:
    promotion_winrate: 0.55
    require_ci_above_half: true
    bootstrap_floor:
      enabled: false

telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

monitors:
  hard_abort_grad_norm: 10.0
  hard_abort_draw_rate: 0.55
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0
