# anchor's ~1.85e-3 1M-cosine LR instead of this file's `lr: 2e-3`/`eta_min: 5e-4`,
# plus a cold-started replay buffer). A solver-OFF CONTROL arm under the SAME
# broken regime reproduced the trap-flip damage almost exactly (12.9%→6.5% BOTH
# arms) — the injection is EXONERATED, the read is INDETERMINATE. The LIVE re-run
# is the three-arm `configs/variants/ws3v3_arm_{control,inject,seeded}.yaml`
