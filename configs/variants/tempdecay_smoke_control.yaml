# D-TEMPDECAY Phase-3 training smoke — CONTROL arm (constant τ=0.5, schedule OFF).
#
# Continues golong@50k PEAK (checkpoints/golong_bank/checkpoint_00050000_PEAK_sb0.38.pt)
# for ~10k steps. The full checkpoint resumes optimizer + the re-warm cosine
# scheduler (T_max≈270k, last_epoch≈20k → smooth decay over 50k→60k, NO override
# needed, no oscillation footgun). Matches golong's regime (cap+CQV, mixing 0.8/0.1,
# jitter) — the ONLY variable vs tempdecay_smoke_<treat> is the within-game temperature.
#
# Verdict rests on TRAINING-logged metrics (value_accuracy_selfplay = §D-VALCEIL Q3
# per-source masked value accuracy; draw_rate; forced_win_conversion). Heavy eval
# opponents (sealbot/nnue/offwindow) DISABLED to avoid extra host builds; strength
# round_robin is done post-hoc between the two arms' final checkpoints.
# Pre-registration + gates: reports/investigations/tempdecay_phase0_2026-06-12.md.
#
# Launch (preflight rm of any stale buffer not needed — fresh host):
#   python scripts/train.py \
#     --checkpoint checkpoints/golong_bank/checkpoint_00050000_PEAK_sb0.38.pt \
#     --variant tempdecay_smoke_control --iterations 10000
encoding: v6_live2
in_channels: 4

aux_opp_reply_weight: 0.0            # CF-5 (match golong)

selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0
  playout_cap:
    temperature_threshold_compound_moves: 0     # schedule OFF (control)
    temp_min: 0.5

mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"   # decay_steps 200k inherits base
  # Per-arm buffer (ISOLATION): arm2 resumes step>0 and would else auto-load arm1's
  # persisted buffer (project_buffer_persist_guard_bypass). Distinct path per arm.
  buffer_persist_path: "checkpoints_tdsmoke_control/replay_buffer.bin"

telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

# Eval OFF for the 10k smoke (verdict is training-metric based; avoids the slow
# arenas + sealbot/hammerhead build deps). Post-hoc round_robin compares arms.
eval_interval: 999999
eval_pipeline:
  opponents:
    best_checkpoint: { enabled: false }
    sealbot:         { enabled: false }
    bootstrap_anchor:{ enabled: false }
    random:          { enabled: false }
    nnue:            { enabled: false }
    offwindow_adversary: { enabled: false }

# In-run draw safety gate — pre-registered tighter than golong's 0.55 (this is a
# draw-risk lever): recent-window draw rate >= 0.30 for 3 consecutive eval points → halt.
monitors:
  hard_abort_grad_norm: 10.0
  hard_abort_draw_rate: 0.30
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0
