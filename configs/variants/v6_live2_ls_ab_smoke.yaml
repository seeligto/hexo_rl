# configs/variants/v6_live2_ls_ab_smoke.yaml
#
# D-RERUNPREP Phase 3 — GPU INTEGRATION SMOKE for the Arm-C fixed-loop re-run.
# A FULL-BATTERY clone of v6_live2_ls_ab.yaml with the ONLY change being
# eval_interval 12500 -> 200, so a tiny run (--iterations 500) exercises the
# entire run-lifecycle the §D-LOOPFIX report deferred ("GPU-bound"):
#
#   round_idx = step // eval_interval ; fire iff round_idx % stride == 0
#     step 200 (round_idx 1): best n=400 + sealbot + random + bootstrap_anchor   -> promotion decision 1
#     step 400 (round_idx 2): + nnue(s2) + offwindow(s2) FIRE                     -> promotion decision 2 + Obj-A in-run read
#     stop at 500 (NOT an eval boundary -> no double-eval) -> close-out:
#         DRAIN(budgeted) -> STOP pool -> TERMINAL eval (ignore_stride, all phases, UNLOADED)
#         -> terminal_eval_complete -> promote -> exit 0
#   promotion_capable_in_run_rounds = 2 (>=2 required) ; >=1 nnue/offwindow in-run read.
#
# NOTHING is downsized vs the real config (n=400 best kept) so the smoke proves the
# REAL eval path (Phase-3 criterion 6), not a cheaper stand-in. Only eval_interval moves.
#
# LAUNCH (operator-run on vast; see scripts/run_phase3_armc_smoke.sh which also runs
# tests/test_closeout_lifecycle.py first, the mini-resume, and the probe wiring smokes):
#   rm -f checkpoints/best_model.pt checkpoints/best_model.pt.bak checkpoints/replay_buffer.bin
#   python scripts/train.py \
#     --checkpoint checkpoints/bootstrap_model_v6_live2.pt \
#     --variant v6_live2_ls_ab_smoke \
#     --iterations 500

# ── encoding (4-plane [0,8,16,17]; multi-window legal-set, no off-window drop) ──
encoding: v6_live2_ls
in_channels: 4

# ── LR — re-warm cosine (identical to v6_live2_ls_ab) ─────────────────────────
lr: 2e-3
eta_min: 5e-4

# ── CF-5 (smoke-continuity): zero the mis-fed opp-reply aux head ──────────────
aux_opp_reply_weight: 0.0

# ── selfplay — IDENTICAL to v6_live2_ls_ab ────────────────────────────────────
selfplay:
  completed_q_values: true
  n_workers: 18
  inference_batch_size: 128
  inference_max_wait_ms: 16.0
  random_opening_plies: 0

# ── mixing — REUSE the v6_live2 corpus (identical to v6_live2_ls_ab) ──────────
mixing:
  pretrained_buffer_path: "data/bootstrap_corpus_v6_live2.npz"

# ── eval — ONLY DELTA vs v6_live2_ls_ab: eval_interval 12500 -> 200 ───────────
eval_interval: 200
eval_pipeline:
  opponents:
    best_checkpoint:
      enabled: true
      stride: 1
      n_games: 400          # kept full — criterion 6 (>=1 n=400 promotion decision, NOT downsized)
      opponent_sims: 64
    sealbot:
      enabled: true
      stride: 1
      n_games: 100
    random:
      enabled: true
      stride: 1
      n_games: 20
    bootstrap_anchor:
      enabled: true
      stride: 1
      n_games: 20
      model_sims: 128
      opponent_sims: 128
      path: "checkpoints/bootstrap_model_v6_live2.pt"
    nnue:
      enabled: true
      stride: 2             # fires at round_idx 2 (step 400) in-run
      n_games: 50
      time_per_stone_ms: 500
      model_sims: 128
    offwindow_adversary:
      enabled: true
      stride: 2             # fires at round_idx 2 (step 400) in-run; WATCH-only
      n_games: 100
      arm: "exploit"
      model_sims: 128
  gating:
    # SAME incumbent pin as v6_live2_ls_ab (criterion 7 — startup sha assertion).
    expected_anchor_sha256: "4198d5cbd2fc0ce77ad2e3d86e32311ee40c53c926f135c52ea3749816b0a186"

# ── telemetry ─────────────────────────────────────────────────────────────────
telemetry:
  emit_outcome_distribution: true
  emit_value_pred_at_ply_cap: true

# ── monitors — IDENTICAL to v6_live2_ls_ab ────────────────────────────────────
monitors:
  hard_abort_grad_norm: 10.0
  hard_abort_draw_rate: 0.55
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0
