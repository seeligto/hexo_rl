# §169 A3 — K-cluster + PMA + global summary token ablation arm.
#
# Same recipe as the v6w25 anchor (§168 Gate 5) and A2 — only architectural
# delta vs A2 is pool_type: 'pma_global' adds the global-token branch (32×32
# cur/opp/canvas-mask crop → 2 conv blocks + KataGo gpool + Linear → d=128
# token; learnable scalar gate init 0.1 controls how much the K+1th token
# contributes to the SAB input).

arm: A3
description: K-cluster encoder + PMA pool + global summary token (gated)
sprint: "§169"

encoding: v6w25
board_size: 25
in_channels: 8
n_actions: 626
filters: 128
res_blocks: 12
se_reduction_ratio: 4

pool_type: pma_global
pool_attn_dropout: 0.1
pool_n_heads: 4
pool_global_gate_init: 0.1   # small init — A3 starts close to A2; gate earns weight via grad

# §169 A3 corpus is v6w25 + per-position (3, 32, 32) global crop. Regenerate
# via: python scripts/export_corpus_npz.py --encoding v6w25 \
#         --with-global-crop --human-only --no-compress.
corpus_npz: data/bootstrap_corpus_v6w25_with_global.npz

# Match v6w25 anchor (§168 Gate 5) — 30 ep cosine, peak 2e-3, eta_min 5e-5, batch 256.
batch_size: 256
epochs: 30
lr_peak: 2.0e-3
eta_min: 5.0e-5
label_smoothing: 0.05
aux_opp_reply_weight: 0.15

artefacts:
  checkpoint: checkpoints/ablation_169/A3_pma_global.pt
  pretrain_log: reports/ablation_169/A3_pretrain.log
  eval: reports/ablation_169/A3_eval.json
  threat_probe: reports/ablation_169/A3_threat.json
  bench: reports/ablation_169/bench_per_arm.md

# Hard surface conditions — see scripts/pretrain_a3_pma_global.sh + scripts/eval_a3_pma_global.sh.
hard_stop:
  final_loss_gt: 5.36          # 50% above v6w25 anchor 3.57 (same threshold as A2)
  nan_skip_pct_gt: 30
  pma_collapse_required: true  # synthetic 2-cluster fixture, same as A2

# Soft surface (warning, not STOP):
#   - PMA collapse onto global token (model ignores all K clusters): the
#     §169 P3 prompt's collapse-onto-global STOP — surface, recommend
#     attention entropy reg.
#   - Padding leak (model performance drops when canvas-realness mask
#     held out): surface as soft warning unless A3 < A1.
soft_warn:
  collapse_onto_global: true
  padding_leak_check: true

eval_matrix:
  argmax:
    legal_radius: 8
    n_games: 200
  mcts_n:
    n_games: 200
    n_sims: operator_chosen     # default 128 per §169 P1 estimate

# Logged at every train_step log_interval — non-None for pma_global runs.
# Useful as a learning-rate canary: if the gate stays at init (~0.1) at
# epoch-30 the global branch was never used; if it grows past ~0.5 the
# model leans heavily on global features (which may indicate cluster
# collapse — see soft_warn.collapse_onto_global).
training_logging:
  pool_global_gate: true
