# corpus.yaml — corpus quality filtering and source weighting
# Generated defaults can be overridden manually.

min_game_length: 22           # P10 of combined distribution
min_quality_score: 0.0        # set > 0 to hard-filter low-quality games
label_smoothing_default: 0.05 # raise to 0.1 when human corpus > 2000
elo_weight_exponent: 2        # sampling weight proportional to elo^exponent

source_weights:               # relative sampling weight per source
  human: 1.0
  bot_d4: 0.8
  bot_d6: 1.0                 # d6 is higher quality per game

quality_weights:              # quality score formula weights
  w_elo: 0.4
  w_len: 0.3
  w_ent: 0.3
  bot_elo_components:
    bot_d4: 0.6               # stronger than average human
    bot_d6: 0.75              # strong bot play

flags:
  p1_win_rate_concern: true   # bot_d4 shows 62.5% P1 win rate
  low_opening_diversity: true # bot_d6 dupe rate 50.3% (> 50% threshold)
  single_window_corpus: true  # median K = 1 across all sources
