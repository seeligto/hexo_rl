# corpus.yaml — corpus quality filtering and source weighting
# Generated defaults can be overridden manually.

corpus_npz_path: data/bootstrap_corpus.npz  # primary load path for pretrain (mmap'd)
min_game_length: 22           # P10 of combined distribution
min_quality_score: 0.0        # set > 0 to hard-filter low-quality games
label_smoothing_default: 0.05 # raise to 0.1 when human corpus > 2000
elo_weight_exponent: 2        # sampling weight proportional to elo^exponent

# Pretrain mode (make corpus.export.pretrain):
#   Human-only corpus, all 4,044 games included (no Elo floor).
#   Bot/injected sources disabled — human games only for this pretrain run.
#   Elo-band sampling weights below bias toward stronger play:
#     sub_1000=0.5, 1000_1200=1.0, 1200_1400=1.5, 1400_plus=2.0
#   A 1200–1400 game's positions appear 3× as often as sub-1000.
#   Baked into NPZ at export time via weighted rng.choice; all saved weights=1.0.
pretrain_human_only: true
pretrain_elo_band_weights:
  sub_1000:   0.5
  1000_1200:  1.0
  1200_1400:  1.5
  1400_plus:  2.0

source_weights:               # relative sampling weight per source (buffer prefill)
  human: 1.0
  bot_fast: 0.8
  bot_strong: 1.0             # strong (0.5s) is higher quality per game
  injected: 0.9               # human-seed bot-continuation; hybrid quality

quality_weights:              # quality score formula weights
  w_elo: 0.4
  w_len: 0.3
  w_ent: 0.3
  bot_elo_components:
    bot_fast: 0.6             # stronger than average human
    bot_strong: 0.75          # strong bot play

use_human_seeding: true        # seed bot openings from human midgame positions
human_seeding_min_move: 10     # earliest move to truncate human game at
human_seeding_max_move: 25     # latest move to truncate human game at

flags:
  p1_win_rate_concern: true   # bot_fast shows 62.5% P1 win rate
  low_opening_diversity: true # bot_strong dupe rate 50.3% (> 50% threshold)
  single_window_corpus: true  # median K = 1 across all sources
