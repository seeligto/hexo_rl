# monitors.yaml — per-metric threshold configuration

monitors:
  # Selfplay axis-distribution thresholds (§axis_dist).
  # Fraction of adjacent same-color stone pairs along any single hex axis.
  # Sustained excess above axis_alert may indicate a degenerate strategy.
  axis_warn: 0.45
  axis_alert: 0.50
  # §CANARY-VAL (2026-05-31) — stride-5 spam hard-abort. The LIVE gate (read by
  # loop.py → StepCoordinator), distinct from the dead `hard_abort:` block.
  # Fires when the pool's rolling-50 stride5 P90 stays ≥ threshold for
  # hard_abort_stride5_p90_consec consecutive eval points. Validated: radius-5
  # benign P90 ≤4 (0 false positives over 25,601 on-disk games); cosine-temp
  # draw-collapse spam P90 86-133. Set threshold ≤ 0 to disable.
  hard_abort_stride5_p90: 30
  hard_abort_stride5_p90_consec: 3
  # §D-GOLONG — sustained self-play draw-rate hard-abort. The pool-wide recent
  # draw rate (mean of per-worker rolling-50 rates) ≥ hard_abort_draw_rate for
  # hard_abort_draw_rate_consec consecutive eval points (past _min_step) → halt.
  # A decisive game has an intrinsic draw rate ~0-5% (v6_live2 30k smoke: 0.05);
  # a sustained climb is the §144/§155 draw-lock collapse signature. Set
  # hard_abort_draw_rate ≤ 0 to disable (DEFAULT OFF here — operator arms it on
  # the run variant, e.g. configs/variants/v6_live2_golong.yaml). Complements
  # the stride5 spam gate, which only catches lattice-spam-shaped draw collapses.
  hard_abort_draw_rate: 0.0
  hard_abort_draw_rate_consec: 3
  hard_abort_draw_rate_min_step: 0
