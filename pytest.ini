[pytest]
testpaths = tests
norecursedirs = vendor .git .venv target
markers =
    timeout(duration): mark test with timeout constraint
    slow: marks tests as slow (excluded from make test.py; run via make test.integration)
    integration: marks end-to-end integration tests that launch subprocesses
filterwarnings =
    ignore:The pynvml package is deprecated.*:FutureWarning
    # PyTorch JIT internals use deprecated APIs on Python 3.14 — not our code
    ignore:`torch.jit.script_method` is not supported in Python 3\.14\+.*:DeprecationWarning
    # §124 — jit.trace deprecated on Py3.14 but functional; InferenceServer
    # has a runtime fallback so dropping support degrades gracefully. Migrate
    # to torch.export when PT removes jit.trace.
    ignore:`torch.jit.trace` is not supported in Python 3\.14\+.*:DeprecationWarning
    ignore:`torch.jit.trace_method` is not supported in Python 3\.14\+.*:DeprecationWarning
    # GroupNorm has a defensive `if size_prods == 1` branch; for (B, 128, 19,
    # 19) size_prods > 1 always, so trace's constant capture is correct.
    ignore:Converting a tensor to a Python boolean might cause the trace to be incorrect.*::torch.jit
    # False positive: fires on first train_step before any optimizer.step() has ever run
    ignore:Detected call of `lr_scheduler.step\(\)` before `optimizer.step\(\)`.*:UserWarning