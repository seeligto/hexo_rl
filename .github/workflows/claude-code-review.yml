name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

  # Also allow @claude mentions in PR comments and review comments
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  # ── Automated review on every PR open/update ──────────────────────────────
  automated-review:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # required: Claude posts review comments
      issues: write          # required: Claude posts issue comments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude automated PR review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          use_sticky_comment: true   # edits one comment instead of spamming

          prompt: |
            You are performing an automated code review for this pull request.

            PR:    ${{ github.event.pull_request.title }}
            Repo:  ${{ github.repository }}
            #:     ${{ github.event.pull_request.number }}
            Base:  ${{ github.base_ref }}
            Head:  ${{ github.head_ref }}

            Review the diff and provide structured feedback covering:

            1. **Correctness** — bugs, logic errors, off-by-ones
            2. **Safety / Security** — injection risks, unsafe unwrap/panic in Rust,
               unchecked array access, secrets in code
            3. **Performance** — unnecessary allocations, avoidable clones,
               hot-path concerns (MCTS inner loops must have zero heap allocs)
            4. **Test coverage** — are new code paths exercised?
            5. **Config discipline** — any hardcoded values that should be in configs/?
            6. **Architecture boundary** — no Python in MCTS hot loops,
               no tensor assembly in Rust, no dashboard imports in training/selfplay paths

            Be concise. File inline comments where relevant.
            Do NOT suggest refactors unrelated to the diff.

          claude_args: |
            --max-turns 5

  # ── Interactive: respond when @claude is mentioned in a comment ───────────
  interactive:
    if: |
      github.event_name == 'issue_comment' ||
      github.event_name == 'pull_request_review_comment'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude interactive response
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          claude_args: |
            --max-turns 10
