# ---------------------------------------------------------------------------
# gnn_axis_v1 — GNN axis-graph encoding (representation="graph", schema v4).
# GNN-integration WP-3 (C3). Whole-board axis graph (NO K-cluster windows);
# per-legal-node policy with NO off-window drop (ragged, seam design §1
# option (b)). The dense-plane fields are inert for a graph (n_planes=0,
# plane_layout=[], kept_plane_indices=[], n_source_planes=0); the axis-graph
# geometry lives in the schema-v4 graph fields below, which the worker reads
# into hexo_graph::BuildParams — zero scattered 6/11/5 literals on the build
# path (CLAUDE.md registry rule). Action space is UNCHANGED: a graph plays the
# identical 19×19+pass board, so policy_logit_count STAYS 362 (contract §C4).
# Ragged payload contract v1 (docs/designs/gnn_ragged_contract_v1.md);
# builder = native hexo-graph (BUILDER_IMPL_NATIVE=1), asserted by the resolver.
# ---------------------------------------------------------------------------
[encodings.gnn_axis_v1]
representation          = "graph"
board_size              = 19          # action-space board (19×19+pass)
trunk_size              = 19          # window_flat_idx origin for policy_dst_slot
cluster_window_size     = "none"
cluster_threshold       = "none"
legal_move_radius       = 6           # matches graph_radius
n_planes                = 0           # graph carries no dense planes
plane_layout            = []
policy_logit_count      = 362         # 19*19 + 1 — UNCHANGED action space
has_pass_slot           = true
is_multi_window         = false
value_pool              = "none"
policy_pool             = "none"
sym_table_id            = "size_19"   # D6 aug reuses axis_perm (contract Part 3)
kept_plane_indices      = []
n_source_planes         = 0
k_max                   = 1           # whole-board: one graph per leaf
# ── schema-v4 graph fields (representation="graph" only) ──
node_feat_dim           = 11          # relative-7 + threat-4 (hexo_graph::NODE_FEAT_DIM)
edge_feat_dim           = 5           # axis one-hot(3) + signed_dist + src_player
win_length              = 6
graph_radius            = 6
win_axes                = 3
contract_version        = 1           # ragged-payload contract this encoding speaks
builder_impl_required   = 1           # native tag the resolver asserts
schema_version          = 4
notes                   = "GNN axis-graph (legacy relative+threat schema). Ragged payload contract v1. Whole-board (no K-cluster); per-legal-node policy, no off-window drop. Builder = native hexo-graph."
