# engine/src/encoding/registry.toml
#
# Canonical encoding registry — single source of truth for every encoding
# the codebase supports. Both Rust (engine) and Python (hexo_rl) parse
# this file and build immutable `EncodingSpec` records keyed by name.
#
# Authored 2026-05-09 per §172 Phase A3. Schema locked by §172 Phase A2:
#   docs/designs/encoding_registry_design.md §3.1 (schema), §3.2 (worked
#   examples — values copied verbatim into this file).
# Schema v2 additions (§173 A3, 2026-05-11):
#   kept_plane_indices — physical source-plane indices retained by wire format.
#   n_source_planes    — source tensor plane count before slicing.
# Schema v3 additions (cycle 3 P55 Wave 9, 2026-05-17):
#   k_max — multi-window cluster-count upper bound per position emitted by
#           Board::get_cluster_views(); = 1 for single-window encodings.
#           Used by InferenceBatcher pool-size auto-derive in
#           SelfPlayRunner::new (closes the cycle 1 hardcoded 512 prefill).
# Schema v4 additions (GNN-integration WP-3, 2026-07-14) — BACKWARD-COMPATIBLE:
#   representation — "grid" | "graph" discriminant. ABSENT → "grid", so every
#           pre-v4 grid entry stays valid v4 unchanged (they omit the key and
#           keep schema_version=3). Only graph encodings declare schema_version=4.
#   node_feat_dim / edge_feat_dim / win_length / graph_radius / win_axes /
#   contract_version / builder_impl_required — axis-graph geometry, present ONLY
#           for representation="graph"; the worker reads them into BuildParams so
#           no 6/11/5 literal lands on the build path. Validator gates the
#           grid-only invariants on representation="grid" and the graph
#           invariants on "graph" (single-sourced against hexo_graph constants).
#           See docs/designs/gnn_inference_seam_design.md §5-below.
#
# Adding a new encoding:
#   1. Append a `[encodings.<name>]` table with all required keys (§3.1).
#   2. Bump `schema_version` only if the schema itself changes (a key is
#      added/removed/renamed across all encodings).
#   3. Run `python -m hexo_rl.encoding audit` to confirm parse + validation.
#
# Schema invariants (validated at parse time — see §3.3):
#   - len(plane_layout) == n_planes
#   - policy_logit_count == board_size * board_size + (1 if has_pass_slot else 0)
#     (A3 amendment: v8 / v8_canvas_realness have no pass slot; existing
#     checkpoints have policy_fc.out_features=625, not 626. The A2 schema
#     rule "= bs²+1" missed this. Per-encoding has_pass_slot bit added.)
#   - is_multi_window=false ⇒ cluster_window_size="none", cluster_threshold="none",
#                            value_pool="none", policy_pool="none"
#   - is_multi_window=true  ⇒ cluster_window_size,cluster_threshold are ints,
#                            value_pool ∈ {min,max,mean}, policy_pool ∈ {scatter_max,scatter_mean}
#   - trunk_size == cluster_window_size if is_multi_window else board_size
#   - len(kept_plane_indices) == n_planes
#   - all kept_plane_indices unique
#   - max(kept_plane_indices) < n_source_planes
#   - n_source_planes >= n_planes
#
# ── kept_plane_indices conventions ──────────────────────────────────────────
# All current encodings keep the canonical 8-plane "X+history, O+history"
# block from the v6 source tensor:
#   [0, 1, 2, 3]   → current-player (X side): t0, t-1, t-2, t-3
#   [8, 9, 10, 11] → opponent (O side):        t0, t-1, t-2, t-3
# v8 family additionally keeps indices [18, 19, 20] from its 21-plane
# source tensor:
#   18 → off_window_mask (vanilla) OR canvas_realness (flipped polarity)
#   19 → moves_remaining_bcast
#   20 → to_play_bcast
# A new encoding's kept_plane_indices entry should be commented with
# its own per-index semantic mapping.

# ---------------------------------------------------------------------------
# v6 — canonical 19×19 single-window, 8 planes (history-only).
# Phase 1–3 anchor; pre-§150 reference.
# ---------------------------------------------------------------------------
[encodings.v6]
board_size              = 19
trunk_size              = 19
cluster_window_size     = "none"
cluster_threshold       = "none"
legal_move_radius       = 5
n_planes                = 8
plane_layout            = [
  # 4× current-player history (most-recent first)
  "current_player_t0", "current_player_t-1", "current_player_t-2", "current_player_t-3",
  # 4× opponent history (most-recent first)
  "opponent_t0",       "opponent_t-1",       "opponent_t-2",       "opponent_t-3",
]
policy_logit_count      = 362            # 19*19 + 1 (last = pass)
has_pass_slot           = true
is_multi_window         = false
value_pool              = "none"
policy_pool             = "none"
sym_table_id            = "size_19"
# kept_plane_indices: canonical X+history, O+history (see header comment).
kept_plane_indices      = [0, 1, 2, 3, 8, 9, 10, 11]
n_source_planes         = 18
k_max                   = 1            # single-window → 1 cluster view per leaf
schema_version          = 3
notes                   = "v6 canonical encoding (Phase 1-3 anchor)."

