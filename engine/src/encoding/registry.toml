# ---------------------------------------------------------------------------
# v6w25 — K-cluster 25×25 windows, matched-perception variant.
# §174 retired as selfplay anchor — 3 bootstrap recipes (e30 / e50 / v6→v6w25
# transfer FT) all failed viability gate at R=8 MCTS-128. Pretrain+eval+
# matched-MCTS pin LIFTED. Retained as future re-entry target; §175 escalates
# to v6 sustained (100K steps, n=100 SealBot eval).
# board_size widens to 25 per A2 §3.2 + A1 §6.11 (canvas semantics: canvas
# == cluster window for K-cluster encodings).
# ---------------------------------------------------------------------------
[encodings.v6w25]
board_size              = 25
trunk_size              = 25            # = cluster_window_size for multi-window
cluster_window_size     = 25
cluster_threshold       = 8
legal_move_radius       = 8
n_planes                = 8
plane_layout            = [
  "current_player_t0", "current_player_t-1", "current_player_t-2", "current_player_t-3",
  "opponent_t0",       "opponent_t-1",       "opponent_t-2",       "opponent_t-3",
]
policy_logit_count      = 626            # 25*25 + 1
has_pass_slot           = true
is_multi_window         = true
value_pool              = "min"          # §170 P4 P1 NULL — K-invariant value head
policy_pool             = "scatter_max"  # per-move cluster dispatch (α design Option iii)
sym_table_id            = "size_25"
# kept_plane_indices: canonical X+history, O+history (see header comment).
kept_plane_indices      = [0, 1, 2, 3, 8, 9, 10, 11]
n_source_planes         = 18
k_max                   = 8            # multi-window cap; ~33% head-room over observed K_avg≈6
schema_version          = 4
action_anchor_mode      = "global_bbox"
notes                   = "§174 retired as selfplay anchor (3 bootstrap recipes failed viability gate at R=8 MCTS-128). Pretrain+eval+matched-MCTS pin LIFTED. Retained as future re-entry target."

# ---------------------------------------------------------------------------
# v7mw — v7full + K-cluster multi-window perception at 19×19.
# Same model architecture as v7full (n_planes=8, board_size=19,
# policy_logit_count=362, sym_table_id=size_19) — v7full weights load
# directly into v7mw with no shape changes. Difference is selfplay:
# is_multi_window=true activates the §173 α multi-window K-cluster path,
# get_cluster_views() can emit K>1 windows when stones spread beyond
# cluster_threshold=5 hex distance. Isolates the multi-window effect from
# the v6w25 confound (v6w25 also widens window to 25×25 and action space
# to 626). §176a experiment.
# ---------------------------------------------------------------------------
[encodings.v7mw]
board_size              = 19
trunk_size              = 19            # = cluster_window_size for multi-window
cluster_window_size     = 19
cluster_threshold       = 5             # hex-distance; matches legal_move_radius
legal_move_radius       = 5
n_planes                = 8
plane_layout            = [
  "current_player_t0", "current_player_t-1", "current_player_t-2", "current_player_t-3",
  "opponent_t0",       "opponent_t-1",       "opponent_t-2",       "opponent_t-3",
]
policy_logit_count      = 362            # 19*19 + 1 (same as v7full)
has_pass_slot           = true
is_multi_window         = true
value_pool              = "min"          # §170 P4 P1 canonical aggregation
policy_pool             = "scatter_max"  # per-move cluster dispatch (α §3.1)
sym_table_id            = "size_19"      # 19×19 sym tables shared with v6/v7full
# kept_plane_indices: canonical X+history, O+history (see header comment).
kept_plane_indices      = [0, 1, 2, 3, 8, 9, 10, 11]
n_source_planes         = 18
k_max                   = 8            # multi-window cap; matches v6w25 head-room target
schema_version          = 4
action_anchor_mode      = "global_bbox"
notes                   = "§176a — v7full arch + K-cluster multi-window perception at 19×19. Isolates multi-window from v6w25 action-space confound."

# ---------------------------------------------------------------------------
# v6tp — v6 wire format + turn-phase planes (CF-2, §P5-CT Phase 5a).
# Identical to v6 except it KEEPS source planes 16 (moves_remaining==2) and
# 17 (ply parity), giving the value head an explicit turn-phase signal. The
# v6 family drops 16/17, forcing the value head to infer mid-turn vs
# turn-boundary from stone-count parity alone while both position types carry
# the same terminal z (audit CF-2 — value-head discrimination collapse). The
# channels encoder (encode.rs:96-116) and Python to_tensor (game_state.py:
# 241-242) already emit 16/17 identically, so no encoder change is needed;
# only this 10-plane slice differs from v6. n_planes 8→10 ⇒ model in_channels
# must be 10 (fresh pretrain, NOT a v6/v7full transfer).
# ---------------------------------------------------------------------------
[encodings.v6tp]
board_size              = 19
trunk_size              = 19
cluster_window_size     = "none"
cluster_threshold       = "none"
legal_move_radius       = 5
n_planes                = 10
plane_layout            = [
  # 4× current-player history (most-recent first)
  "current_player_t0", "current_player_t-1", "current_player_t-2", "current_player_t-3",
  # 4× opponent history (most-recent first)
  "opponent_t0",       "opponent_t-1",       "opponent_t-2",       "opponent_t-3",
  # turn-phase scalars (broadcast over the plane)
  "moves_remaining_bcast",   # source plane 16: moves_remaining == 2 ? 1 : 0
  "ply_parity_bcast",        # source plane 17: ply % 2
]
policy_logit_count      = 362            # 19*19 + 1 (last = pass)
has_pass_slot           = true
is_multi_window         = false
value_pool              = "none"
policy_pool             = "none"
sym_table_id            = "size_19"
# kept_plane_indices: canonical X+history, O+history + turn-phase 16/17.
kept_plane_indices      = [0, 1, 2, 3, 8, 9, 10, 11, 16, 17]
n_source_planes         = 18
k_max                   = 1            # single-window → 1 cluster view per leaf
schema_version          = 4
action_anchor_mode      = "global_bbox"
notes                   = "§P5-CT Phase 5a CF-2 — v6 wire format + turn-phase planes 16/17 (value-head discrimination signal). Fresh 10-plane pretrain; not a v6/v7full transfer."

# ---------------------------------------------------------------------------
# v6_live2 — v6tp MINUS the dead history planes (H-PLANE-MISMATCH fix).
# Keeps ONLY the planes that are live on BOTH the pretrain and self-play paths:
# current/opponent stones at t0 (0/8) + turn-phase scalars (16/17). The v6
# family's history planes 1-3/9-11 are populated in the Python pretrain corpus
# but written as ZERO by the Rust self-play encoder (encode.rs) — a 6-plane
# pretrain↔selfplay distribution shift (see
# reports/investigations/hplane_mismatch_20260529.md). Dropping them makes the
# two phases see an identical 4-plane input. n_planes 10→4 ⇒ model in_channels
# must be 4 (fresh pretrain, NOT a v6tp/v6 transfer). No encoder change: the
# channels encoder already emits 0/8/16/17 live on both paths.
# ---------------------------------------------------------------------------
[encodings.v6_live2]
board_size              = 19
trunk_size              = 19
cluster_window_size     = "none"
cluster_threshold       = "none"
legal_move_radius       = 5
n_planes                = 4
plane_layout            = [
  "current_player_t0",       # source plane 0
  "opponent_t0",             # source plane 8
  "moves_remaining_bcast",   # source plane 16: moves_remaining == 2 ? 1 : 0
  "ply_parity_bcast",        # source plane 17: ply % 2
]
policy_logit_count      = 362            # 19*19 + 1 (last = pass)
has_pass_slot           = true
is_multi_window         = false
value_pool              = "none"
policy_pool             = "none"
sym_table_id            = "size_19"
# kept_plane_indices: live-on-both-paths set only — my/opp t0 + turn-phase 16/17.
kept_plane_indices      = [0, 8, 16, 17]
n_source_planes         = 18
k_max                   = 1            # single-window → 1 cluster view per leaf
schema_version          = 4
action_anchor_mode      = "global_bbox"
notes                   = "§P5-CT H-PLANE-MISMATCH fix — v6tp minus dead history planes 1-3/9-11 (live in pretrain, zeroed in self-play). 4-plane live-on-both set [0,8,16,17]. Fresh 4-plane pretrain."

