# ---------------------------------------------------------------------------
# v6w25 — K-cluster 25×25 windows, matched-perception variant.
# §170 P4 P1 canonical for pretrain+eval+matched-MCTS. Selfplay deferred to α.
# board_size widens to 25 per A2 §3.2 + A1 §6.11 (canvas semantics: canvas
# == cluster window for K-cluster encodings).
# ---------------------------------------------------------------------------
[encodings.v6w25]
board_size              = 25
trunk_size              = 25            # = cluster_window_size for multi-window
cluster_window_size     = 25
cluster_threshold       = 8
legal_move_radius       = 8
n_planes                = 8
plane_layout            = [
  "current_player_t0", "current_player_t-1", "current_player_t-2", "current_player_t-3",
  "opponent_t0",       "opponent_t-1",       "opponent_t-2",       "opponent_t-3",
]
policy_logit_count      = 626            # 25*25 + 1
has_pass_slot           = true
is_multi_window         = true
value_pool              = "min"          # §170 P4 P1 NULL — K-invariant value head
policy_pool             = "scatter_max"  # per-move cluster dispatch (α design Option iii)
sym_table_id            = "size_25"
# kept_plane_indices: canonical X+history, O+history (see header comment).
kept_plane_indices      = [0, 1, 2, 3, 8, 9, 10, 11]
n_source_planes         = 18
schema_version          = 2
notes                   = "§170 P4 P1 canonical for pretrain+eval+matched-MCTS; selfplay blocked on α."

# ---------------------------------------------------------------------------
# v8 — bbox-of-stones 25×25, 11 planes (history + 3 aux).
# Plane-8 polarity OFF→OUTSIDE (vanilla v8 contract).
# ---------------------------------------------------------------------------
[encodings.v8]
board_size              = 25
trunk_size              = 25
cluster_window_size     = "none"
cluster_threshold       = "none"
legal_move_radius       = 8
n_planes                = 11
plane_layout            = [
  # 4× current-player history
  "current_player_t0", "current_player_t-1", "current_player_t-2", "current_player_t-3",
  # 4× opponent history
  "opponent_t0",       "opponent_t-1",       "opponent_t-2",       "opponent_t-3",
  # plane 8 — outside-of-window mask (vanilla polarity)
  "off_window_mask",
  # plane 9 — broadcast scalar (moves remaining in turn)
  "moves_remaining_bcast",
  # plane 10 — broadcast scalar (side to play)
  "to_play_bcast",
]
policy_logit_count      = 625            # 25*25 (no pass slot — v8 contract)
has_pass_slot           = false
is_multi_window         = false
value_pool              = "none"
policy_pool             = "none"
sym_table_id            = "size_25"
# kept_plane_indices: X+history, O+history [0..3, 8..11] + v8 aux planes [18,19,20].
# See header comment for index→semantic mapping.
kept_plane_indices      = [0, 1, 2, 3, 8, 9, 10, 11, 18, 19, 20]
n_source_planes         = 21
schema_version          = 2
notes                   = "v8 contract — single-bbox 25x25; plane-8 polarity OFF->OUTSIDE (vanilla); no pass slot (existing v8 ckpts have policy_fc.out_features=625)."

# ---------------------------------------------------------------------------
# v8_canvas_realness — v8 with plane-8 polarity flipped (inside→canvas).
# §169 A4 / §170 P4 P2 variant. Pairs with PartialConv2d trunk-entry.
# ---------------------------------------------------------------------------
[encodings.v8_canvas_realness]
board_size              = 25
trunk_size              = 25
cluster_window_size     = "none"
cluster_threshold       = "none"
legal_move_radius       = 8
n_planes                = 11
plane_layout            = [
  "current_player_t0", "current_player_t-1", "current_player_t-2", "current_player_t-3",
  "opponent_t0",       "opponent_t-1",       "opponent_t-2",       "opponent_t-3",
  # plane 8 — canvas-realness mask (INSIDE->CANVAS polarity, flipped vs v8)
  "canvas_realness",
  "moves_remaining_bcast",
  "to_play_bcast",
]
policy_logit_count      = 625            # 25*25 (no pass slot — same as v8)
has_pass_slot           = false
is_multi_window         = false
value_pool              = "none"
policy_pool             = "none"
sym_table_id            = "size_25"
# kept_plane_indices: X+history, O+history [0..3, 8..11] + v8 aux planes [18,19,20].
# Plane 18 is canvas_realness (flipped polarity vs v8). See header comment.
kept_plane_indices      = [0, 1, 2, 3, 8, 9, 10, 11, 18, 19, 20]
n_source_planes         = 21
schema_version          = 2
notes                   = "§169 A4 / §170 P4 P2 variant; plane-8 polarity INSIDE->CANVAS for PartialConv2d trunk-entry. Pair with bootstrap_corpus_v8_canvas_realness.npz (sha 110ea6b2…)."
