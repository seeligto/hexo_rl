kept_plane_indices      = [0, 1, 2, 3, 8, 9, 10, 11, 18, 19, 20]
n_source_planes         = 21
k_max                   = 1            # single-window → 1 cluster view per leaf
schema_version          = 4
action_anchor_mode      = "global_bbox"
notes                   = "v8 contract — single-bbox 25x25; plane-8 polarity OFF->OUTSIDE (vanilla); no pass slot (existing v8 ckpts have policy_fc.out_features=625)."

