<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HeXO — Viewer</title>
<link rel="stylesheet" href="/static/hexo.css">
<!-- socket.io for socket.connected check in setInterval (N5) -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
body {
    font-family: var(--font-ui);
    /* HexCanvas CSS custom properties */
    --player0: var(--p0-color);
    --player1: var(--p1-color);
    --last-ring: var(--last-ring);
    --grid-stroke: #1a3050;
    --stone-outline: #0a0a1a;
    --canvas-bg: var(--bg-panel);
    --empty-text: #444;
}

/* ── Left panel: board ────────────────────────────────────── */
#board-panel {
    flex: 0 0 70%;
    display: flex;
    flex-direction: column;
    padding: 12px;
}
#board-canvas {
    flex: 1;
    background: var(--bg-panel);
    border-radius: 8px;
    cursor: pointer;
}

/* ── Bottom bar ───────────────────────────────────────────── */
#controls {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    flex-shrink: 0;
}
#controls button {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 14px;
}
#controls button:hover { background: var(--border); }
#controls button.active { background: var(--accent); border-color: var(--accent); }
#scrubber {
    flex: 1;
    accent-color: var(--accent);
}
#move-label { font-size: 13px; color: var(--text-muted); min-width: 80px; }

/* Overlay toggles */
#overlay-toggles {
    display: flex;
    gap: 6px;
    margin-left: 12px;
}
#overlay-toggles label {
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 3px;
}

/* ── Value sparkline ──────────────────────────────────────── */
#sparkline-container {
    height: 120px;
    flex-shrink: 0;
    position: relative;
}
#sparkline-canvas {
    width: 100%;
    height: 100%;
    background: var(--bg-panel);
    border-radius: 6px;
    cursor: pointer;
}
#sparkline-label {
    position: absolute;
    top: 4px;
    left: 8px;
    font-size: 11px;
    color: #666;
}

/* ── Right panel: sidebar ─────────────────────────────────── */
#sidebar {
    flex: 0 0 30%;
    display: flex;
    flex-direction: column;
    padding: 12px 12px 12px 0;
    gap: 10px;
    overflow: hidden;
}

/* Legend */
#legend {
    font-size: 12px;
    line-height: 1.8;
    padding: 8px;
    background: var(--bg-panel);
    border-radius: 6px;
}
.legend-row { display: flex; align-items: center; gap: 6px; }
.legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
}

/* Position stats */
#pos-stats {
    font-size: 12px;
    padding: 8px;
    background: var(--bg-panel);
    border-radius: 6px;
    line-height: 1.6;
}

/* Game list */
#game-list-container {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-panel);
    border-radius: 6px;
}
#game-list-container h3 {
    padding: 8px;
    font-size: 13px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg-panel);
}
.game-item {
    padding: 6px 8px;
    font-size: 12px;
    cursor: pointer;
    border-bottom: 1px solid #0d1b30;
    display: flex;
    justify-content: space-between;
}
.game-item:hover { background: #1a3050; }
.game-item.active { background: var(--border); }
.game-winner-0 { color: var(--p0-color); }
.game-winner-1 { color: var(--p1-color); }
.game-winner-draw { color: var(--text-muted); }
</style>
</head>
<body>

<nav class="hexo-nav">
    <span class="nav-brand">HeXO</span>
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/viewer" class="nav-link active">Viewer</a>
    <a href="/analyze" class="nav-link">Analyzer</a>
</nav>

<div class="page-root">

<div id="board-panel">
    <canvas id="board-canvas"></canvas>
    <div id="controls">
        <button id="btn-start" title="First move">&#x23EE;</button>
        <button id="btn-prev" title="Previous">&#x25C0;</button>
        <button id="btn-play" title="Play/Pause">&#x25B6;</button>
        <button id="btn-next" title="Next">&#x25B6;</button>
        <button id="btn-end" title="Last move">&#x23ED;</button>
        <input type="range" id="scrubber" min="0" max="0" value="0">
        <span id="move-label">Move 0/0</span>
        <div id="overlay-toggles">
            <label><input type="checkbox" id="toggle-threats" checked> threats</label>
            <label id="heat-toggle-label"><input type="checkbox" id="toggle-heat"> mcts heat</label>
        </div>
    </div>
    <div id="sparkline-container">
        <canvas id="sparkline-canvas"></canvas>
        <span id="sparkline-label">value</span>
        <span id="capture-status" title="" style="position:absolute;top:4px;right:8px;font-size:10px;color:#888;display:none"></span>
    </div>
</div>

<div id="sidebar">
    <div id="legend">
        <div class="legend-row"><span class="legend-dot" style="background:var(--p0-color)"></span> P0 (Blue)</div>
        <div class="legend-row"><span class="legend-dot" style="background:var(--p1-color)"></span> P1 (Coral)</div>
        <div class="legend-row"><span class="legend-dot" style="background:var(--last-ring);border:2px solid var(--last-ring)"></span> Last placed</div>
        <div class="legend-row"><span class="legend-dot" style="background:var(--threat-critical)"></span> Critical threat (lvl 5)</div>
        <div class="legend-row"><span class="legend-dot" style="background:var(--threat-forced)"></span> Forced threat (lvl 4)</div>
    </div>

    <div id="pos-stats">
        <div>Player to move: <span id="stat-player">—</span></div>
        <div>Value estimate: <span id="stat-value">—</span></div>
        <div>Threats: <span id="stat-threats">—</span></div>
        <div title="§152 Class-4 — stride-5 / row-max stone tags for this game">
            Stride-5 / row-max: <span id="stat-stride5">—</span>
        </div>
    </div>

    <div id="game-list-container">
        <h3>Recent Games</h3>
        <div id="game-list"></div>
    </div>
</div>

</div><!-- .page-root -->

<script type="module">
import { HexCanvas } from '/static/hex_canvas.js';

// Viewer: replay only.

// ── Socket — used only for connected check in setInterval (N5) ───────────────
const socket = io({ reconnection: true, reconnectionDelay: 2000, reconnectionAttempts: Infinity });

// ── State ────────────────────────────────────────────────────────────────────

let gameData = null;       // enriched game record from /viewer/game/<id>
let moveIdx = 0;           // current position index (-1 = before first move)
let playInterval = null;
let showThreats = true;
let showHeat = false;

// ── HexCanvas instance ──────────────────────────────────────────────────────

const boardCanvas = document.getElementById('board-canvas');
const hex = new HexCanvas(boardCanvas, { coordLabels: 'none' });

// ── Helpers ─────────────────────────────────────────────────────────────────

function parseAxial(s) {
    const m = s.match(/\(?\s*(-?\d+)\s*,\s*(-?\d+)\s*\)?/);
    return m ? [parseInt(m[1]), parseInt(m[2])] : [0, 0];
}

// ── Board rendering via HexCanvas ───────────────────────────────────────────

function renderBoard() {
    const canvas = boardCanvas;
    const rect = canvas.parentElement.getBoundingClientRect();
    const sparkH = document.getElementById('sparkline-container').offsetHeight;
    const controlsH = document.getElementById('controls').offsetHeight;
    canvas.width = rect.width - 24;
    canvas.height = rect.height - sparkH - controlsH - 48;

    if (!gameData) {
        hex.setBoard([]);
        hex.clearAllOverlays();
        hex._emptyText = 'Select a game from the list';
        hex.render();
        return;
    }
    hex._emptyText = null;

    // Gather stones up to current position
    const stones = [];
    const moveList = gameData.moves_list || [];
    const limit = moveIdx + 1;

    let currentPlayer = 0;
    let movesRemaining = 1;
    for (let i = 0; i < limit && i < moveList.length; i++) {
        const [q, r] = parseAxial(moveList[i]);
        stones.push({ q, r, player: currentPlayer });
        movesRemaining--;
        if (movesRemaining === 0) {
            currentPlayer = 1 - currentPlayer;
            movesRemaining = 2;
        }
    }

    hex.setBoard(stones);
    hex.clearAllOverlays();

    // MCTS heat overlay
    if (showHeat && gameData.positions && moveIdx >= 0 && moveIdx < gameData.positions.length) {
        const pos = gameData.positions[moveIdx];
        if (pos && pos.top_visits) {
            const maxVisits = Math.max(...pos.top_visits.map(v => v.visits), 1);
            const heatCells = pos.top_visits.map(tv => {
                const [tq, tr] = parseAxial(tv.coord);
                const norm = tv.visits / maxVisits;
                return { q: tq, r: tr, color: 'rgba(55, 138, 221, 1)', opacity: norm * 0.55 };
            });
            hex.setOverlay('visits', heatCells);
        }
    }

    // Threats: level>=4 only (forced+critical). Level 3 suppressed.
    if (showThreats && gameData.positions && moveIdx >= 0 && moveIdx < gameData.positions.length) {
        const pos = gameData.positions[moveIdx];
        if (pos && pos.threats && pos.threats.length > 0) {
            // Dedup: keep highest level per (q,r)
            const dedupMap = new Map();
            for (const t of pos.threats) {
                const key = `${t.q},${t.r}`;
                const existing = dedupMap.get(key);
                if (!existing || t.level > existing.level) {
                    dedupMap.set(key, t);
                }
            }

            const threatCells = [];
            for (const t of dedupMap.values()) {
                if (t.level < 4) continue;  // filter: level>=4 only
                const isCritical = t.level >= 5;
                threatCells.push({
                    q: t.q, r: t.r,
                    circle: true,
                    circleColor: isCritical ? 'var(--threat-critical)' : 'var(--threat-forced)',
                    circleWidth: isCritical ? 3 : 2,
                    dash: [],  // solid circles, no dashes
                    circleFill: isCritical
                        ? 'rgba(226, 75, 74, 0.25)'
                        : 'rgba(239, 159, 39, 0.20)',
                });
            }
            if (threatCells.length > 0) {
                hex.setOverlay('threats', threatCells);
            }
        }
    }

    // Last placed ring
    if (stones.length > 0) {
        const lastTwo = stones.slice(-2).map(s => ({ q: s.q, r: s.r, ring: true }));
        hex.setOverlay('last_placed', lastTwo);
    }

    hex.render();
    updateStats(stones, currentPlayer, movesRemaining);
}

function updateStats(stones, currentPlayer, movesRemaining) {
    document.getElementById('stat-player').textContent =
        stones.length === 0 ? 'P0 (Blue)' :
        `P${currentPlayer} (${currentPlayer === 0 ? 'Blue' : 'Coral'})`;

    if (gameData && gameData.positions && moveIdx >= 0 && moveIdx < gameData.positions.length) {
        const pos = gameData.positions[moveIdx];
        document.getElementById('stat-value').textContent =
            pos.value_est != null ? pos.value_est.toFixed(3) : '—';
        const nThreats = pos.threats ? pos.threats.filter(t => t.level >= 4).length : 0;
        const critical = pos.threats ? pos.threats.filter(t => t.level >= 5).length : 0;
        const forced = pos.threats ? pos.threats.filter(t => t.level === 4).length : 0;
        document.getElementById('stat-threats').textContent =
            nThreats === 0 ? 'none' : `${nThreats} (${critical} crit, ${forced} forced)`;
    } else {
        document.getElementById('stat-value').textContent = '—';
        document.getElementById('stat-threats').textContent = '—';
    }
}

// ── Value sparkline ──────────────────────────────────────────────────────────

function renderSparkline() {
    const canvas = document.getElementById('sparkline-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = 120;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameData || !gameData.positions) {
        ctx.fillStyle = '#444';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('no value data', canvas.width / 2, canvas.height / 2);
        return;
    }

    const values = gameData.positions.map(p => p.value_est);
    const hasValues = values.some(v => v != null);
    if (!hasValues) {
        ctx.fillStyle = '#444';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('no value data', canvas.width / 2, canvas.height / 2);
        return;
    }

    const pad = 10;
    const w = canvas.width - pad * 2;
    const h = canvas.height - pad * 2;
    const mid = pad + h / 2;

    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(pad, mid);
    ctx.lineTo(pad + w, mid);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = '#e94560';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    let started = false;
    for (let i = 0; i < values.length; i++) {
        if (values[i] == null) continue;
        const x = pad + (i / Math.max(values.length - 1, 1)) * w;
        const y = mid - values[i] * (h / 2);
        if (!started) { ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
    }
    ctx.stroke();

    if (moveIdx >= 0 && moveIdx < values.length) {
        const x = pad + (moveIdx / Math.max(values.length - 1, 1)) * w;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, pad);
        ctx.lineTo(x, pad + h);
        ctx.stroke();
    }

    ctx.fillStyle = '#666';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('P0', 2, pad + 4);
    ctx.fillText('P1', 2, pad + h);
}

// ── Game list ────────────────────────────────────────────────────────────────

function loadGameList() {
    fetch('/viewer/recent?n=20')
        .then(r => r.json())
        .then(games => {
            const list = document.getElementById('game-list');
            list.innerHTML = '';
            if (games.length === 0) {
                list.innerHTML = '<div style="padding:12px;color:#666;font-size:12px">No games yet. Start training to see games here.</div>';
                return;
            }
            for (const g of games) {
                const div = document.createElement('div');
                div.className = 'game-item';
                const winClass = g.winner === 0 ? 'game-winner-0' : g.winner === 1 ? 'game-winner-1' : 'game-winner-draw';
                const winText = g.winner === 0 ? 'P0 wins' : g.winner === 1 ? 'P1 wins' : 'draw';
                const ago = timeAgo(g.ts);
                div.innerHTML = `
                    <span>${g.game_id.slice(0, 8)}... <span class="${winClass}">${winText}</span> (${g.moves} moves)</span>
                    <span style="color:#666">${ago}</span>
                `;
                div.onclick = () => loadGame(g.game_id);
                list.appendChild(div);
            }
        })
        .catch(() => {});
}

function timeAgo(ts) {
    const diff = Date.now() / 1000 - ts;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

function loadGame(gameId) {
    fetch(`/viewer/game/${gameId}`)
        .then(r => {
            if (!r.ok) throw new Error('not found');
            return r.json();
        })
        .then(data => {
            gameData = data;
            moveIdx = -1;
            const moves = data.moves_list || [];
            const scrubber = document.getElementById('scrubber');
            scrubber.min = -1;             // S2 Option B: -1 = before first move
            scrubber.max = moves.length - 1;
            scrubber.value = -1;           // browser clamps to min without the line above

            const hasDetail = data.positions && data.positions.some(p => p.top_visits);
            document.getElementById('heat-toggle-label').style.display = hasDetail ? '' : 'none';

            // Surface data-capture status (spec §10 deferred items): show a
            // small badge if value_trace / moves_detail are absent so users
            // know why the sparkline / heat overlay may be empty.
            const statusEl = document.getElementById('capture-status');
            const status = data.data_capture_status;
            if (status && (!status.value_trace || !status.moves_detail)) {
                const missing = [];
                if (!status.value_trace) missing.push('value');
                if (!status.moves_detail) missing.push('mcts-heat');
                statusEl.textContent = `no ${missing.join(', ')} (deferred)`;
                statusEl.title = status.deferred_note || '';
                statusEl.style.display = '';
            } else {
                statusEl.style.display = 'none';
            }

            document.querySelectorAll('.game-item').forEach(el => el.classList.remove('active'));
            const items = document.querySelectorAll('.game-item');
            for (const item of items) {
                if (item.textContent.includes(gameId.slice(0, 8))) {
                    item.classList.add('active');
                    break;
                }
            }

            // §152 Class-4 — per-game stride-5 / row-max tag.
            const sr = data.stride5_run_max;
            const rm = data.row_max_density;
            const sEl = document.getElementById('stat-stride5');
            if (typeof sr === 'number' && typeof rm === 'number') {
                const flag = rm > 30 ? ' ⚠' : '';
                sEl.textContent = `${sr} / ${rm}${flag}`;
                sEl.style.color = rm > 30 ? '#F4664A' : (rm > 20 ? '#EF9F27' : '');
            } else {
                sEl.textContent = '—';
                sEl.style.color = '';
            }

            renderBoard();
            renderSparkline();
        })
        .catch(err => console.error('Failed to load game:', err));
}

// ── Scrubber & controls ──────────────────────────────────────────────────────

function updateMoveLabel() {
    const total = gameData ? (gameData.moves_list || []).length : 0;
    document.getElementById('move-label').textContent = `Move ${moveIdx + 1}/${total}`;
}

function seekTo(idx) {
    if (!gameData) return;
    // S2: idx=-1 means "before first move" — renderBoard handles it via limit=moveIdx+1=0
    const max = (gameData.moves_list || []).length - 1;
    moveIdx = Math.max(-1, Math.min(idx, max));
    document.getElementById('scrubber').value = moveIdx;
    updateMoveLabel();
    renderBoard();
    renderSparkline();
}

document.getElementById('btn-start').onclick = () => seekTo(-1);
document.getElementById('btn-end').onclick = () => seekTo(gameData ? (gameData.moves_list || []).length - 1 : 0);
document.getElementById('btn-prev').onclick = () => seekTo(moveIdx - 1);
document.getElementById('btn-next').onclick = () => seekTo(moveIdx + 1);

document.getElementById('btn-play').onclick = function() {
    if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
        this.textContent = '\u25B6';
    } else {
        this.textContent = '\u23F8';
        playInterval = setInterval(() => {
            const max = gameData ? (gameData.moves_list || []).length - 1 : 0;
            if (moveIdx >= max) {
                clearInterval(playInterval);
                playInterval = null;
                document.getElementById('btn-play').textContent = '\u25B6';
                return;
            }
            seekTo(moveIdx + 1);
        }, 300);
    }
};

document.getElementById('scrubber').oninput = function() {
    seekTo(parseInt(this.value));
};

document.getElementById('sparkline-canvas').onclick = function(e) {
    if (!gameData) return;
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const total = (gameData.moves_list || []).length;
    if (total === 0) return;
    const pad = 10;
    const w = this.width - pad * 2;
    const idx = Math.round(((x - pad) / w) * (total - 1));
    seekTo(idx);
};

document.getElementById('toggle-threats').onchange = function() {
    showThreats = this.checked;
    renderBoard();
};
document.getElementById('toggle-heat').onchange = function() {
    showHeat = this.checked;
    renderBoard();
};

// ── Init ─────────────────────────────────────────────────────────────────────

loadGameList();
// N5: skip polling while socket is disconnected — list won't change in standalone/offline mode
setInterval(() => { if (socket.connected) loadGameList(); }, 10000);

window.addEventListener('resize', () => {
    renderBoard();
    renderSparkline();
});

renderBoard();
renderSparkline();
</script>
</body>
</html>
