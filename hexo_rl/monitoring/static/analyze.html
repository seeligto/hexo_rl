<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HeXO — Analyzer</title>
<link rel="stylesheet" href="/static/hexo.css">
<style>
body {
    font-family: var(--font-ui);
    /* HexCanvas CSS custom properties */
    --player0: var(--p0-color);
    --player1: var(--p1-color);
    --last-ring: var(--last-ring);
    --grid-stroke: #1a3050;
    --grid-hover: #2a4a70;
    --coord-color: #555;
    --stone-outline: #0a0a1a;
    --canvas-bg: var(--bg-panel);
    --empty-text: #444;
}

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    padding: 12px;
    gap: 8px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
}
#sidebar h2 { font-size: 15px; color: var(--text-muted); font-weight: 600; }

.control-group { display: flex; flex-direction: column; gap: 4px; }
.control-group label { font-size: 11px; color: var(--text-muted); }
.control-group select,
.control-group input[type="number"] {
    background: var(--bg-panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 12px;
}

.toggle-group {
    display: flex;
    gap: 0;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
}
.toggle-group button {
    flex: 1;
    background: var(--bg-card);
    color: var(--text-muted);
    border: none;
    padding: 5px 0;
    cursor: pointer;
    font-size: 12px;
}
.toggle-group button.active { background: var(--accent); color: #fff; }

.btn {
    background: var(--bg-card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
}
.btn:hover { background: var(--border); }
.btn-row { display: flex; gap: 4px; }

.checkbox-row {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-muted);
}

#mcts-controls {
    display: none;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
    background: #0d1b30;
    border-radius: 4px;
}

/* Results panel */
#results {
    font-size: 12px;
    padding: 6px;
    background: var(--bg-panel);
    border-radius: 6px;
    line-height: 1.6;
    flex-shrink: 0;
}
#results .val { color: var(--accent); font-weight: 600; font-family: var(--font-mono); }
#results .label { color: var(--text-muted); }

#top-moves {
    font-size: 11px;
    line-height: 1.5;
    max-height: 150px;
    overflow-y: auto;
}
#top-moves .move-entry { font-family: var(--font-mono); color: #ccc; }
#top-moves .move-prob { color: #4eaa6f; }
#top-moves .move-logit { color: var(--text-muted); }

#mcts-results {
    display: none;
    font-size: 11px;
    line-height: 1.5;
    padding: 6px;
    background: #0d1b30;
    border-radius: 4px;
}

/* Move list */
#move-list {
    font-size: 11px;
    font-family: var(--font-mono);
    line-height: 1.4;
    color: var(--text-muted);
    max-height: 80px;
    overflow-y: auto;
    word-wrap: break-word;
}
.move-p0 { color: var(--p0-color); }
.move-p1 { color: var(--p1-color); }

#status-bar {
    font-size: 11px;
    color: #666;
    min-height: 16px;
}

/* ── Play section ────────────────────────────────────────── */
#play-section {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
}
#play-section-header {
    padding: 6px 8px;
    background: var(--bg-card);
    cursor: pointer;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
}
#play-section-header:hover { background: var(--border); }
#play-section-body {
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 8px;
    background: var(--bg-panel);
}
#play-section-body.open { display: flex; }

.player-select {
    display: flex;
    gap: 4px;
}
.player-select label {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
}
.player-select label:hover { background: var(--border); }

#play-status {
    font-size: 12px;
    color: var(--text-muted);
    min-height: 16px;
    padding: 2px 0;
}

.play-btn-row { display: flex; gap: 4px; }

/* ── Main canvas ─────────────────────────────────────────── */
#canvas-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 12px;
}
#board-canvas {
    flex: 1;
    background: var(--bg-panel);
    border-radius: 8px;
    cursor: crosshair;
}

/* Tooltip */
#tooltip {
    display: none;
    position: fixed;
    background: rgba(15, 20, 40, 0.92);
    color: #ddd;
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 4px 8px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 100;
    border: 1px solid var(--border);
}

/* Loading overlay */
#loading {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px;
    color: var(--accent);
}
</style>
</head>
<body>

<nav class="hexo-nav">
    <span class="nav-brand">HeXO</span>
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/viewer" class="nav-link">Viewer</a>
    <a href="/analyze" class="nav-link active">Analyzer</a>
</nav>

<div class="page-root">

<div id="sidebar">
    <h2>HeXO Analyzer</h2>

    <div class="control-group">
        <label>Checkpoint</label>
        <select id="sel-checkpoint"></select>
    </div>

    <div class="control-group">
        <label>Max moves</label>
        <input type="number" id="inp-maxmoves" value="40" min="1" max="200" style="width:60px;">
    </div>

    <label class="checkbox-row">
        <input type="checkbox" id="chk-autoanalyze" checked>
        Auto-analyze on click
    </label>

    <div class="toggle-group" id="overlay-toggle">
        <button id="btn-raw" class="active">Raw policy</button>
        <button id="btn-mcts">MCTS visits</button>
    </div>

    <div id="mcts-controls">
        <div class="control-group">
            <label>Search mode</label>
            <select id="sel-mcts-mode">
                <option value="puct">PUCT</option>
                <option value="gumbel">Gumbel</option>
            </select>
        </div>
        <div class="control-group">
            <label>Simulations</label>
            <select id="sel-mcts-sims">
                <option value="50">50</option>
                <option value="200" selected>200</option>
                <option value="800">800</option>
            </select>
        </div>
    </div>

    <button class="btn" id="btn-analyze" style="width:100%">Analyze</button>

    <div class="btn-row">
        <button class="btn" id="btn-undo">Undo</button>
        <button class="btn" id="btn-clear">Clear</button>
        <button class="btn" id="btn-copy">Copy</button>
        <button class="btn" id="btn-paste">Paste</button>
    </div>

    <div id="results">
        <div><span class="label">Value:</span> <span class="val" id="res-value">—</span></div>
        <div><span class="label">Entropy:</span> <span class="val" id="res-entropy">—</span></div>
        <div><span class="label">Next:</span> <span id="res-next">—</span></div>
        <div style="margin-top:4px;"><span class="label">Top moves:</span></div>
        <div id="top-moves"></div>
    </div>

    <div id="mcts-results">
        <div><span class="label">MCTS root value:</span> <span class="val" id="mcts-value">—</span></div>
        <div><span class="label">Total sims:</span> <span id="mcts-sims">—</span></div>
        <div style="margin-top:4px;"><span class="label">MCTS top visits:</span></div>
        <div id="mcts-top-moves"></div>
    </div>

    <div id="move-list">Moves: (empty board)</div>
    <div id="status-bar"></div>

    <!-- Play section -->
    <div id="play-section">
        <div id="play-section-header">
            <span>Play against model</span>
            <span id="play-section-arrow">▶</span>
        </div>
        <div id="play-section-body">
            <div class="player-select">
                <label><input type="radio" name="human-player" value="0" checked> P0 (Blue)</label>
                <label><input type="radio" name="human-player" value="1"> P1 (Coral)</label>
            </div>
            <div id="play-status">Press New Game to start</div>
            <div class="play-btn-row">
                <button class="btn" id="btn-new-game" style="flex:1">New Game</button>
                <button class="btn" id="btn-stop-play" style="flex:1;display:none">Stop</button>
            </div>
        </div>
    </div>
</div>

<div id="canvas-panel" style="position:relative;">
    <canvas id="board-canvas"></canvas>
    <div id="loading">analyzing...</div>
</div>

</div><!-- .page-root -->

<div id="tooltip"></div>

<script type="module">
import { HexCanvas } from '/static/hex_canvas.js';

// ── State ────────────────────────────────────────────────────────────────────

let moves = [];           // [{q, r, player}]  player is internal 1/-1
let analysisResult = null;
let mctsResult = null;
let overlayMode = 'raw';  // 'raw' | 'mcts'
let analyzing = false;

// Play mode state
let playMode = false;
let humanPlayer = 0;       // display: 0=P0(Blue), 1=P1(Coral)
let modelThinking = false;

// ── HexCanvas ────────────────────────────────────────────────────────────────

const boardCanvas = document.getElementById('board-canvas');
// Auto-bounds with minRadius: board starts as radius-8 hex shape and expands as stones placed
const hex = new HexCanvas(boardCanvas, { minRadius: 8, coordLabels: 'axial' });

// ── Turn structure ───────────────────────────────────────────────────────────

function getTurnState() {
    // Internal: player=1 opens with 1 stone (first), then alternates 2 per turn.
    // Display: playerIdx(1)=0 → P0 (Blue); playerIdx(-1)=1 → P1 (Coral).
    let player = 1;
    let remaining = 1;
    for (let i = 0; i < moves.length; i++) {
        remaining--;
        if (remaining === 0) {
            player = player === 1 ? -1 : 1;
            remaining = 2;
        }
    }
    return { player, remaining };
}

function playerIdx(p) {
    // HexCanvas uses 0/1 for player index; Board uses 1/-1 internally.
    // player=1 (opens) → display P0 (Blue) → HexCanvas index 0
    // player=-1 → display P1 (Coral) → HexCanvas index 1
    return p === 1 ? 0 : 1;
}

function playerLabel(p) {
    // p is internal (1 or -1). P0=Blue, P1=Coral.
    return p === 1 ? 'P0 (Blue)' : 'P1 (Coral)';
}

function isHumanTurn() {
    const { player } = getTurnState();
    return playerIdx(player) === humanPlayer;
}

// ── Rendering ────────────────────────────────────────────────────────────────

function render() {
    const canvas = boardCanvas;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width - 24;
    canvas.height = rect.height - 24;

    // Auto-bounds: minRadius=8, expands to fit stones
    hex.setCoordLabels(playMode ? 'none' : 'axial');

    // Stones
    const stones = moves.map(m => ({ q: m.q, r: m.r, player: playerIdx(m.player) }));
    hex.setBoard(stones);
    hex.clearAllOverlays();

    // Last placed marker
    if (moves.length > 0) {
        const last = moves[moves.length - 1];
        hex.setOverlay('last_placed', [{ q: last.q, r: last.r, ring: true }]);
    }

    if (!playMode) {
        // Policy/MCTS overlay (analyze mode only)
        if (overlayMode === 'raw' && analysisResult) {
            renderPolicyOverlay(analysisResult);
        } else if (overlayMode === 'mcts' && mctsResult) {
            renderMCTSOverlay(mctsResult);
        }
    }

    hex.render();
}

function renderThreatOverlay(threats) {
    // Threats: level>=4 only (forced+critical). Level 3 suppressed.
    if (!threats || threats.length === 0) return;

    // Dedup: keep highest level per (q,r)
    const dedupMap = new Map();
    for (const t of threats) {
        const key = `${t.q},${t.r}`;
        const existing = dedupMap.get(key);
        if (!existing || t.level > existing.level) {
            dedupMap.set(key, t);
        }
    }

    const threatCells = [];
    for (const t of dedupMap.values()) {
        if (t.level < 4) continue;
        const isCritical = t.level >= 5;
        threatCells.push({
            q: t.q, r: t.r,
            circle: true,
            circleColor: isCritical ? '#E24B4A' : '#EF9F27',
            circleWidth: isCritical ? 3 : 2,
            dash: [],
            circleFill: isCritical
                ? 'rgba(226, 75, 74, 0.25)'
                : 'rgba(239, 159, 39, 0.20)',
        });
    }
    if (threatCells.length > 0) {
        hex.setOverlay('threats', threatCells);
        hex.render();
    }
}

function renderPolicyOverlay(result) {
    const stoneSet = new Set(moves.map(m => `${m.q},${m.r}`));
    const policy = result.policy || [];
    if (policy.length === 0) return;

    const maxProb = Math.max(...policy.map(e => e.prob), 0.001);
    const cells = [];
    let labelCount = 0;

    for (const entry of policy) {
        if (stoneSet.has(`${entry.q},${entry.r}`)) continue;
        const norm = entry.prob / maxProb;
        if (norm < 0.02) continue;

        const cell = {
            q: entry.q, r: entry.r,
            color: `rgba(78, 170, 111, 1)`,
            opacity: Math.max(0.08, norm * 0.6),
        };
        if (labelCount < 8 && entry.prob > 0.01) {
            cell.label = (entry.prob * 100).toFixed(1) + '%';
            cell.labelColor = '#fff';
            labelCount++;
        }
        cells.push(cell);
    }
    hex.setOverlay('policy', cells);
}

function renderMCTSOverlay(result) {
    const stoneSet = new Set(moves.map(m => `${m.q},${m.r}`));
    const visits = result.visits || [];
    if (visits.length === 0) return;

    const maxVisits = Math.max(...visits.map(v => v.visits), 1);
    const cells = [];
    let labelCount = 0;

    for (const entry of visits) {
        if (stoneSet.has(`${entry.q},${entry.r}`)) continue;
        const norm = entry.visits / maxVisits;
        if (norm < 0.02) continue;

        const cell = {
            q: entry.q, r: entry.r,
            color: `rgba(80, 200, 220, 1)`,
            opacity: Math.max(0.08, norm * 0.6),
        };
        if (labelCount < 8 && entry.visits > 0) {
            cell.label = String(entry.visits);
            cell.labelColor = '#fff';
            labelCount++;
        }
        cells.push(cell);
    }
    hex.setOverlay('visits', cells);
}

// ── Results display ──────────────────────────────────────────────────────────

function updateResults(result) {
    if (!result) {
        document.getElementById('res-value').textContent = '—';
        document.getElementById('res-entropy').textContent = '—';
        document.getElementById('res-next').textContent = '—';
        document.getElementById('top-moves').innerHTML = '';
        return;
    }

    // next_to_move=1 (internal) → display P0 (Blue)
    const displayPlayer = result.next_to_move === 1 ? 'P0' : 'P1';
    const sign = result.next_to_move === 1 ? '+' : '';
    document.getElementById('res-value').textContent =
        `${sign}${result.value.toFixed(3)} (${displayPlayer} to move)`;

    document.getElementById('res-entropy').textContent =
        `${result.entropy_nats.toFixed(2)} nats (${(result.entropy_uniform_fraction * 100).toFixed(0)}% of uniform)`;

    const { player, remaining } = getTurnState();
    document.getElementById('res-next').textContent =
        `${playerLabel(player)}, ${remaining} move${remaining > 1 ? 's' : ''} remaining`;

    const topHTML = (result.top_k || []).slice(0, 5).map((e, i) =>
        `<div class="move-entry">${i + 1}. (${e.q},${e.r}) <span class="move-prob">${(e.prob * 100).toFixed(1)}%</span> <span class="move-logit">[${e.logit.toFixed(2)}]</span></div>`
    ).join('');
    document.getElementById('top-moves').innerHTML = topHTML;
}

function updateMCTSResults(result) {
    const panel = document.getElementById('mcts-results');
    if (!result) {
        panel.style.display = 'none';
        return;
    }
    panel.style.display = 'block';
    document.getElementById('mcts-value').textContent = result.root_value.toFixed(3);
    document.getElementById('mcts-sims').textContent = String(result.total_sims);

    const topHTML = (result.top_k || []).slice(0, 5).map((e, i) =>
        `<div class="move-entry">${i + 1}. (${e.q},${e.r}) <span class="move-prob">${e.visits}v</span> <span class="move-logit">Q=${e.q_value.toFixed(3)}</span></div>`
    ).join('');
    document.getElementById('mcts-top-moves').innerHTML = topHTML;
}

function updateMoveList() {
    const el = document.getElementById('move-list');
    if (moves.length === 0) {
        el.innerHTML = 'Moves: (empty board)';
        return;
    }
    let html = 'Moves: ';
    let player = 1, remaining = 1;
    for (let i = 0; i < moves.length; i++) {
        const m = moves[i];
        const cls = playerIdx(m.player) === 0 ? 'move-p0' : 'move-p1';
        html += `<span class="${cls}">${i}.[${Number(m.q)},${Number(m.r)}]</span> `;
        remaining--;
        if (remaining === 0) { player = player === 1 ? -1 : 1; remaining = 2; }
    }
    el.innerHTML = html;
}

function setStatus(msg) {
    document.getElementById('status-bar').textContent = msg;
}

function setPlayStatus(msg) {
    document.getElementById('play-status').textContent = msg;
}

// ── API calls ────────────────────────────────────────────────────────────────

async function fetchCheckpoints() {
    try {
        const resp = await fetch('/api/analyze/checkpoints');
        const list = await resp.json();
        const sel = document.getElementById('sel-checkpoint');
        sel.innerHTML = '';
        for (const entry of list) {
            const opt = document.createElement('option');
            opt.value = entry.path;
            const name = entry.path.split('/').pop();
            opt.textContent = `${name} (${entry.size_mb}MB)`;
            sel.appendChild(opt);
        }
    } catch (e) {
        setStatus('Failed to fetch checkpoints: ' + e.message);
    }
}

async function runAnalysis() {
    if (playMode) return;
    const checkpoint = document.getElementById('sel-checkpoint').value;
    if (!checkpoint) {
        setStatus('No checkpoint selected');
        return;
    }

    analyzing = true;
    document.getElementById('loading').style.display = 'block';
    setStatus('Analyzing...');

    const mctsEnabled = overlayMode === 'mcts';
    const body = {
        checkpoint,
        moves: moves.map(m => ({ q: m.q, r: m.r, player: m.player })),
    };
    if (mctsEnabled) {
        body.mcts = {
            enabled: true,
            mode: document.getElementById('sel-mcts-mode').value,
            simulations: parseInt(document.getElementById('sel-mcts-sims').value),
        };
    }

    try {
        const resp = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const data = await resp.json();

        if (resp.ok) {
            analysisResult = data;
            mctsResult = data.mcts || null;
            updateResults(data);
            updateMCTSResults(mctsResult);
            setStatus(`Done. ${data.legal_moves_count} legal moves.`);
        } else {
            setStatus(`Error: ${data.error || 'unknown'}`);
        }
    } catch (e) {
        setStatus('Request failed: ' + e.message);
    }

    analyzing = false;
    document.getElementById('loading').style.display = 'none';
    render();
}

// ── Play mode ────────────────────────────────────────────────────────────────

function enterPlayMode() {
    playMode = true;
    modelThinking = false;
    moves = [];
    analysisResult = null;
    mctsResult = null;
    updateMoveList();
    updateResults(null);
    updateMCTSResults(null);

    // Disable analyze controls
    document.getElementById('btn-analyze').disabled = true;
    document.getElementById('btn-copy').disabled = true;
    document.getElementById('btn-paste').disabled = true;
    document.getElementById('sel-checkpoint').disabled = true;
    document.getElementById('btn-stop-play').style.display = '';

    setPlayStatus(isHumanTurn() ? 'Your turn. Click a hex.' : 'Model moving...');
    render();

    // If model goes first (human is P1), trigger bot move immediately
    if (!isHumanTurn()) {
        requestBotMove();
    }
}

function exitPlayMode() {
    playMode = false;
    modelThinking = false;

    document.getElementById('btn-analyze').disabled = false;
    document.getElementById('btn-copy').disabled = false;
    document.getElementById('btn-paste').disabled = false;
    document.getElementById('sel-checkpoint').disabled = false;
    document.getElementById('btn-stop-play').style.display = 'none';

    setPlayStatus('Press New Game to start');
    render();
}

async function requestBotMove() {
    const checkpoint = document.getElementById('sel-checkpoint').value;
    if (!checkpoint) {
        setPlayStatus('No checkpoint loaded — cannot play');
        return;
    }

    modelThinking = true;
    setPlayStatus('Model thinking...');

    try {
        const resp = await fetch('/viewer/play', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                moves_so_far: moves.map(m => ({ q: m.q, r: m.r, player: m.player })),
                human_moves: [],
            }),
        });

        if (resp.status === 503) {
            setPlayStatus('No model loaded yet — training must complete first');
            modelThinking = false;
            return;
        }

        const data = await resp.json();
        if (data.error) {
            setPlayStatus('Error: ' + data.error);
            modelThinking = false;
            return;
        }

        // Apply bot moves to board
        for (const m of (data.moves || [])) {
            let q, r;
            if (typeof m === 'string') {
                const match = m.match(/\(?\s*(-?\d+)\s*,\s*(-?\d+)\s*\)?/);
                if (match) { q = parseInt(match[1]); r = parseInt(match[2]); }
            } else if (typeof m === 'object') {
                q = m.q; r = m.r;
            }
            if (q !== undefined) {
                const { player } = getTurnState();
                moves.push({ q, r, player });
            }
        }

        modelThinking = false;
        updateMoveList();
        render();

        // Show threat overlay from response if available
        if (data.threats) {
            renderThreatOverlay(data.threats);
        }
        // Show value estimate if available
        if (data.value != null) {
            const { player } = getTurnState();
            setPlayStatus(
                `Your turn. Value: ${data.value.toFixed(3)} (${playerLabel(player)} to move)`
            );
        } else if (data.winner != null) {
            const w = data.winner === 1 ? 'P0 (Blue)' : data.winner === -1 ? 'P1 (Coral)' : null;
            setPlayStatus(w ? `Game over! ${w} wins!` : 'Game over!');
            return;
        } else {
            setPlayStatus(isHumanTurn() ? 'Your turn. Click a hex.' : 'Game over!');
        }

    } catch (err) {
        setPlayStatus('Network error: ' + err.message);
        modelThinking = false;
    }
}

// ── Interaction ──────────────────────────────────────────────────────────────

hex.onCellClick(({ q, r }) => {
    if (playMode) {
        // Play mode: only accept human moves on human's turn
        if (modelThinking) return;
        if (!isHumanTurn()) return;

        if (moves.some(m => m.q === q && m.r === r)) return;

        const { player } = getTurnState();
        moves.push({ q, r, player });
        updateMoveList();
        render();

        // Check if this completes human's turn
        if (!isHumanTurn()) {
            // Bot's turn
            requestBotMove();
        } else {
            setPlayStatus('Your turn. Click a hex.');
        }
        return;
    }

    // Analyze mode
    if (analyzing) return;
    const maxMoves = parseInt(document.getElementById('inp-maxmoves').value) || 40;
    if (moves.length >= maxMoves) {
        setStatus(`Max moves (${maxMoves}) reached`);
        return;
    }

    if (moves.some(m => m.q === q && m.r === r)) return;

    const { player } = getTurnState();
    moves.push({ q, r, player });
    updateMoveList();
    render();

    if (document.getElementById('chk-autoanalyze').checked) {
        runAnalysis();
    }
});

// Tooltip on hover (analyze mode only)
boardCanvas.addEventListener('mousemove', (e) => {
    const tooltip = document.getElementById('tooltip');
    if (playMode || hex.hexSize === 0) { tooltip.style.display = 'none'; return; }
    const rect = boardCanvas.getBoundingClientRect();
    const [q, r] = hex.pixelToHex(e.clientX - rect.left, e.clientY - rect.top);

    let text = `(${q}, ${r})`;
    if (analysisResult && overlayMode === 'raw') {
        const entry = (analysisResult.policy || []).find(p => p.q === q && p.r === r);
        if (entry) text += ` P=${(entry.prob * 100).toFixed(1)}%`;
    }
    if (mctsResult && overlayMode === 'mcts') {
        const entry = (mctsResult.visits || []).find(v => v.q === q && v.r === r);
        if (entry) text += ` V=${entry.visits} Q=${entry.q_value.toFixed(3)}`;
    }

    tooltip.textContent = text;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
});

boardCanvas.addEventListener('mouseleave', () => {
    document.getElementById('tooltip').style.display = 'none';
});

// ── Controls ─────────────────────────────────────────────────────────────────

document.getElementById('btn-analyze').onclick = () => runAnalysis();

document.getElementById('btn-undo').onclick = () => {
    if (moves.length === 0 || playMode) return;
    moves.pop();
    updateMoveList();
    render();
    if (document.getElementById('chk-autoanalyze').checked) runAnalysis();
};

document.getElementById('btn-clear').onclick = () => {
    if (playMode) return;
    moves = [];
    analysisResult = null;
    mctsResult = null;
    updateResults(null);
    updateMCTSResults(null);
    updateMoveList();
    render();
    if (document.getElementById('chk-autoanalyze').checked) runAnalysis();
};

document.getElementById('btn-copy').onclick = () => {
    navigator.clipboard.writeText(JSON.stringify(moves));
    setStatus('Copied to clipboard');
};

document.getElementById('btn-paste').onclick = async () => {
    if (playMode) return;
    try {
        const text = await navigator.clipboard.readText();
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error('not an array');
        for (const m of parsed) {
            if (typeof m.q !== 'number' || typeof m.r !== 'number') throw new Error('invalid move');
        }
        moves = parsed;
        updateMoveList();
        render();
        if (document.getElementById('chk-autoanalyze').checked) runAnalysis();
        setStatus('Pasted ' + moves.length + ' moves');
    } catch (e) {
        setStatus('Paste failed: ' + e.message);
    }
};

// Overlay mode toggle
document.getElementById('btn-raw').onclick = () => {
    overlayMode = 'raw';
    document.getElementById('btn-raw').classList.add('active');
    document.getElementById('btn-mcts').classList.remove('active');
    document.getElementById('mcts-controls').style.display = 'none';
    render();
};

document.getElementById('btn-mcts').onclick = () => {
    overlayMode = 'mcts';
    document.getElementById('btn-mcts').classList.add('active');
    document.getElementById('btn-raw').classList.remove('active');
    document.getElementById('mcts-controls').style.display = 'flex';
    if (document.getElementById('chk-autoanalyze').checked) runAnalysis();
    else render();
};

// ── Play section controls ─────────────────────────────────────────────────────

document.getElementById('play-section-header').onclick = () => {
    const body = document.getElementById('play-section-body');
    const arrow = document.getElementById('play-section-arrow');
    const isOpen = body.classList.toggle('open');
    arrow.textContent = isOpen ? '▼' : '▶';
};

document.getElementById('btn-new-game').onclick = () => {
    const radios = document.querySelectorAll('input[name="human-player"]');
    for (const r of radios) {
        if (r.checked) { humanPlayer = parseInt(r.value); break; }
    }
    enterPlayMode();
};

document.getElementById('btn-stop-play').onclick = () => exitPlayMode();

// ── Deep-link support ────────────────────────────────────────────────────────

function parseDeepLink() {
    const params = new URLSearchParams(window.location.search);
    const movesParam = params.get('moves');
    const ckpt = params.get('checkpoint');

    if (movesParam) {
        try {
            const decoded = JSON.parse(atob(movesParam));
            if (Array.isArray(decoded)) {
                for (const m of decoded) {
                    if (typeof m.q !== 'number' || typeof m.r !== 'number') throw new Error('invalid move');
                }
                moves = decoded;
            }
        } catch { /* ignore */ }
    }

    if (ckpt) {
        setTimeout(() => {
            const sel = document.getElementById('sel-checkpoint');
            for (const opt of sel.options) {
                if (opt.value === ckpt) { sel.value = ckpt; break; }
            }
        }, 500);
    }
}

// ── Resize ───────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => render());

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
    await fetchCheckpoints();
    parseDeepLink();
    updateMoveList();
    render();

    if (document.getElementById('sel-checkpoint').value) {
        runAnalysis();
    }
}

init();
</script>
</body>
